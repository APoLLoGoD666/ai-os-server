<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="apex-version" content="v8" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>APEX AI OS v8</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#00d4ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #0a0a0a;
            --glass:        rgba(255,255,255,0.03);
            --glass-border: rgba(0,212,255,0.12);
            --accent:       #00d4ff;
            --accent-dim:   rgba(0,212,255,0.18);
            --accent-glow:  rgba(0,212,255,0.35);
            --text:         #eef2ff;
            --muted:        rgba(238,242,255,0.4);
            --danger:       #ff4d6d;
            --topbar-h:     60px;
            --strip-h:      54px;
            --input-h:      76px;
            --panel-w:      272px;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ══ APP GRID ══════════════════════════════════════════════════ */
        .app {
            display: grid;
            width: 100vw; height: 100vh;
            grid-template-rows: var(--topbar-h) 1fr var(--strip-h) var(--input-h);
            grid-template-columns: var(--panel-w) 1fr var(--panel-w);
            grid-template-areas:
                "topbar topbar topbar"
                "left   centre right"
                "strip  strip  strip"
                "inputz inputz inputz";
        }

        /* ══ TOP BAR ═══════════════════════════════════════════════════ */
        .topbar {
            grid-area: topbar;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 26px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(8,8,10,0.92);
            backdrop-filter: blur(20px);
            z-index: 20;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-ring {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
            display: grid; place-items: center;
            box-shadow: 0 0 12px var(--accent-glow), inset 0 0 10px rgba(0,212,255,0.05);
            animation: brand-pulse 3s ease-in-out infinite;
        }

        @keyframes brand-pulse {
            0%,100% { box-shadow: 0 0 12px var(--accent-glow), inset 0 0 10px rgba(0,212,255,0.05); }
            50%      { box-shadow: 0 0 22px var(--accent-glow), inset 0 0 18px rgba(0,212,255,0.1);  }
        }

        .brand-ring-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .brand-copy strong {
            display: block;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.28em;
            color: var(--accent);
        }

        .brand-copy span {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .topbar-clock {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .clock-time {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .clock-date {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .topbar-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 7px var(--accent);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .status-dot.offline {
            background: var(--danger);
            box-shadow: 0 0 7px var(--danger);
        }

        /* ══ SIDE PANELS ═══════════════════════════════════════════════ */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 18px 14px;
            overflow: hidden;
            background: rgba(0,212,255,0.016);
        }

        .left-panel  { grid-area: left;  border-right:  1px solid var(--glass-border); }
        .right-panel { grid-area: right; border-left:   1px solid var(--glass-border); }

        .panel-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        /* ── Memory list ── */
        .memory-scroll {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 2px;
        }

        .memory-scroll::-webkit-scrollbar { width: 2px; }
        .memory-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

        .mem-item {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.025);
            transition: border-color 0.2s;
        }

        .mem-role {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .mem-role.user { color: rgba(238,242,255,0.45); }

        .mem-time {
            font-size: 9px;
            color: var(--muted);
            margin-top: 3px;
        }

        .mem-text {
            font-size: 12px;
            line-height: 1.55;
            color: rgba(238,242,255,0.82);
            word-break: break-word;
        }

        /* ── Approval queue ── */
        .queue-scroll {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .queue-scroll::-webkit-scrollbar { width: 2px; }
        .queue-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

        .queue-card {
            padding: 12px 13px;
            border-radius: 12px;
            border: 1px solid rgba(0,212,255,0.18);
            background: rgba(0,212,255,0.045);
        }

        .queue-card-goal {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.45;
        }

        .queue-card-summary {
            font-size: 11px;
            color: var(--muted);
            margin: 3px 0 5px;
            line-height: 1.4;
        }

        .queue-card-meta {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .queue-actions {
            display: flex;
            gap: 8px;
        }

        .queue-btn {
            flex: 1;
            height: 32px;
            border-radius: 8px;
            border: none;
            font-family: inherit;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: transform 0.14s, opacity 0.14s;
        }

        .queue-btn:hover { transform: translateY(-1px); }
        .queue-btn:active { transform: translateY(1px); }
        .queue-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

        .queue-btn.yes {
            background: rgba(0,212,255,0.14);
            border: 1px solid rgba(0,212,255,0.35);
            color: var(--accent);
        }

        .queue-btn.no {
            background: rgba(255,77,109,0.1);
            border: 1px solid rgba(255,77,109,0.28);
            color: #ff7a92;
        }

        .queue-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--muted);
        }

        .queue-empty-icon { font-size: 26px; opacity: 0.35; }
        .queue-empty-text { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }

        /* ══ CENTRE ════════════════════════════════════════════════════ */
        .centre {
            grid-area: centre;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            position: relative;
            overflow: hidden;
        }

        /* Grid background */
        .centre::before {
            content: "";
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.028) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.028) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
        }

        /* Radial halo */
        .centre-halo {
            position: absolute;
            width: 460px; height: 460px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,212,255,0.055) 0%, transparent 68%);
            pointer-events: none;
        }

        /* ── Orb ── */
        .orb-shell {
            position: relative;
            display: grid;
            place-items: center;
            z-index: 2;
        }

        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid var(--accent);
            opacity: 0;
            pointer-events: none;
        }

        .pr1 { width: 258px; height: 258px; }
        .pr2 { width: 318px; height: 318px; }
        .pr3 { width: 378px; height: 378px; }

        .orb-shell.active   .pr1 { animation: pulse-out 2s ease-out infinite 0s;    }
        .orb-shell.active   .pr2 { animation: pulse-out 2s ease-out infinite 0.38s; }
        .orb-shell.active   .pr3 { animation: pulse-out 2s ease-out infinite 0.76s; }
        .orb-shell.listening .pr1 { animation: pulse-out 0.85s ease-out infinite 0s;    }
        .orb-shell.listening .pr2 { animation: pulse-out 0.85s ease-out infinite 0.14s; }
        .orb-shell.listening .pr3 { animation: pulse-out 0.85s ease-out infinite 0.28s; }
        .orb-shell.waiting .pr1 { animation: pulse-wait 3s ease-out infinite 0s;   }
        .orb-shell.waiting .pr2 { animation: pulse-wait 3s ease-out infinite 1s;   }
        .orb-shell.waiting .pr3 { animation: pulse-wait 3s ease-out infinite 2s;   }

        @keyframes pulse-wait {
            0%   { transform: scale(0.90); opacity: 0.18; }
            100% { transform: scale(1.10); opacity: 0;    }
        }

        @keyframes pulse-out {
            0%   { transform: scale(0.88); opacity: 0.65; }
            100% { transform: scale(1.18); opacity: 0;    }
        }

        .orb {
            width: 196px; height: 196px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            position: relative;
            background: radial-gradient(circle at 36% 34%, rgba(0,212,255,0.14), rgba(0,0,0,0.82));
            border: 1.5px solid rgba(0,212,255,0.38);
            box-shadow:
                0 0 40px rgba(0,212,255,0.18),
                0 0 80px rgba(0,212,255,0.07),
                inset 0 0 42px rgba(0,212,255,0.04);
            animation: orb-breathe 4.5s ease-in-out infinite;
            transition: box-shadow 0.3s;
            user-select: none;
        }

        .orb:hover {
            box-shadow:
                0 0 58px rgba(0,212,255,0.3),
                0 0 100px rgba(0,212,255,0.12),
                inset 0 0 42px rgba(0,212,255,0.07);
        }

        @keyframes orb-breathe {
            0%,100% { box-shadow: 0 0 40px rgba(0,212,255,0.18), 0 0 80px rgba(0,212,255,0.07), inset 0 0 42px rgba(0,212,255,0.04); }
            50%      { box-shadow: 0 0 56px rgba(0,212,255,0.26), 0 0 110px rgba(0,212,255,0.1), inset 0 0 56px rgba(0,212,255,0.06); }
        }

        .orb-name {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.26em;
            color: var(--accent);
            text-shadow: 0 0 18px var(--accent);
        }

        .orb-sub {
            font-size: 8px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(0,212,255,0.52);
        }

        /* ── Waveform ── */
        .waveform {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 28px;
            opacity: 0;
            transition: opacity 0.25s;
            z-index: 2;
        }

        .waveform.active { opacity: 1; }

        .wb {
            width: 3px;
            border-radius: 2px;
            background: var(--accent);
            box-shadow: 0 0 5px var(--accent);
            height: 14px;
            will-change: transform;
            transform-origin: center;
        }

        .waveform.active .wb:nth-child(1) { animation: wb 0.75s ease-in-out infinite 0.00s; }
        .waveform.active .wb:nth-child(2) { animation: wb 0.75s ease-in-out infinite 0.10s; }
        .waveform.active .wb:nth-child(3) { animation: wb 0.75s ease-in-out infinite 0.20s; }
        .waveform.active .wb:nth-child(4) { animation: wb 0.75s ease-in-out infinite 0.15s; }
        .waveform.active .wb:nth-child(5) { animation: wb 0.75s ease-in-out infinite 0.05s; }
        .waveform.active .wb:nth-child(6) { animation: wb 0.75s ease-in-out infinite 0.25s; }
        .waveform.active .wb:nth-child(7) { animation: wb 0.75s ease-in-out infinite 0.12s; }

        @keyframes wb {
            0%,100% { transform: scaleY(0.29); }
            50%      { transform: scaleY(1.57); }
        }

        /* ── Orb status text ── */
        .orb-status {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(0,212,255,0.6);
            z-index: 2;
        }

        /* ── Chat log ── */
        .chat-log {
            width: 100%;
            max-width: 540px;
            max-height: 188px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 7px;
            padding: 0 20px;
            z-index: 2;
        }

        .chat-log::-webkit-scrollbar { width: 2px; }
        .chat-log::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

        .chat-bubble {
            max-width: 84%;
            padding: 9px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.55;
            word-break: break-word;
            user-select: text;
        }

        .apex-latency {
            font-size: 10px;
            color: var(--muted);
            align-self: flex-start;
            padding-left: 4px;
            margin-top: -4px;
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            gap: 4px;
            padding: 10px 14px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 14px;
        }
        .typing-indicator.active { display: flex; }
        .typing-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--accent);
            opacity: 0.4;
            animation: tdot 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes tdot { 0%,80%,100% { opacity:0.2; transform:scale(0.8); } 40% { opacity:1; transform:scale(1); } }

        .chat-status-bar {
            width: 100%;
            max-width: 540px;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.08em;
            text-align: center;
            z-index: 2;
            padding: 0 20px;
        }

        .clear-chat-btn {
            flex-shrink: 0;
            height: 32px;
            padding: 0 10px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.08);
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
            white-space: nowrap;
            transition: border-color 0.2s, color 0.2s;
        }
        .clear-chat-btn:hover { border-color: rgba(255,77,109,0.4); color: #ff4d6d; }

        .chat-bubble.user {
            align-self: flex-end;
            background: rgba(0,212,255,0.11);
            border: 1px solid rgba(0,212,255,0.2);
            color: var(--text);
        }

        .chat-bubble.ai {
            align-self: flex-start;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            color: rgba(238,242,255,0.86);
        }

        .chat-bubble.system {
            align-self: flex-start;
            background: rgba(255,212,0,0.06);
            border: 1px solid rgba(255,212,0,0.14);
            color: rgba(255,220,80,0.8);
            font-size: 11px;
        }

        /* ── Inline approval card (centre) ── */
        .centre-approval {
            width: 100%;
            max-width: 420px;
            padding: 16px 18px;
            border-radius: 14px;
            background: rgba(0,212,255,0.07);
            border: 1px solid rgba(0,212,255,0.24);
            z-index: 2;
        }

        .capp-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .capp-text {
            font-size: 13px;
            line-height: 1.55;
            color: var(--text);
            margin-bottom: 14px;
        }

        .capp-actions {
            display: flex;
            gap: 10px;
        }

        .capp-btn {
            flex: 1;
            height: 38px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: transform 0.14s, opacity 0.14s;
        }

        .capp-btn:hover { transform: translateY(-1px); }
        .capp-btn:active { transform: translateY(1px); }

        .capp-btn.yes {
            background: rgba(0,212,255,0.16);
            border: 1px solid rgba(0,212,255,0.38);
            color: var(--accent);
        }

        .capp-btn.no {
            background: rgba(255,77,109,0.12);
            border: 1px solid rgba(255,77,109,0.3);
            color: #ff7a92;
        }

        /* ══ NOTIFICATION STRIP ════════════════════════════════════════ */
        .notif-strip {
            grid-area: strip;
            display: flex;
            align-items: center;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5,5,7,0.6);
            overflow: hidden;
        }

        .notif-label {
            flex-shrink: 0;
            padding: 0 14px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            border-right: 1px solid var(--glass-border);
            height: 100%;
            display: flex;
            align-items: center;
        }

        .notif-scroll {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            height: 100%;
        }

        .notif-scroll::-webkit-scrollbar { display: none; }

        .notif-chip {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 5px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0,212,255,0.14);
            background: rgba(0,212,255,0.04);
            font-size: 11px;
            color: var(--text);
            white-space: nowrap;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .notif-chip:hover {
            border-color: rgba(0,212,255,0.3);
            background: rgba(0,212,255,0.09);
        }

        .notif-chip.unread {
            border-color: rgba(0,212,255,0.28);
            color: var(--accent);
        }

        .notif-pip {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 4px var(--accent);
        }

        .notif-none {
            font-size: 11px;
            color: var(--muted);
        }

        /* ══ INPUT AREA ════════════════════════════════════════════════ */
        .input-area {
            grid-area: inputz;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 22px;
            background: rgba(8,8,10,0.96);
            border-top: 1px solid var(--glass-border);
        }

        .mic-btn {
            width: 46px; height: 46px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 1.5px solid rgba(0,212,255,0.32);
            background: rgba(0,212,255,0.07);
            color: var(--accent);
            font-size: 19px;
            cursor: pointer;
            display: grid; place-items: center;
            transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .mic-btn:hover {
            background: rgba(0,212,255,0.14);
            border-color: rgba(0,212,255,0.5);
            box-shadow: 0 0 14px rgba(0,212,255,0.2);
        }

        .mic-btn.listening {
            background: rgba(0,212,255,0.18);
            border-color: var(--accent);
            box-shadow: 0 0 22px rgba(0,212,255,0.4);
            animation: mic-glow 0.9s ease-in-out infinite;
        }

        @keyframes mic-glow {
            0%,100% { box-shadow: 0 0 22px rgba(0,212,255,0.4); }
            50%      { box-shadow: 0 0 38px rgba(0,212,255,0.7); }
        }

        .chat-input {
            flex: 1;
            height: 46px;
            padding: 0 18px;
            border-radius: 23px;
            border: 1px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input:focus {
            border-color: rgba(0,212,255,0.28);
            box-shadow: 0 0 0 1px rgba(0,212,255,0.08);
        }

        .chat-input::placeholder { color: rgba(238,242,255,0.18); }

        .send-btn {
            width: 46px; height: 46px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 1.5px solid rgba(0,212,255,0.38);
            background: rgba(0,212,255,0.1);
            color: var(--accent);
            font-size: 17px;
            cursor: pointer;
            display: grid; place-items: center;
            transition: background 0.2s, box-shadow 0.2s, transform 0.14s;
        }

        .send-btn:hover {
            background: rgba(0,212,255,0.18);
            box-shadow: 0 0 18px rgba(0,212,255,0.28);
            transform: scale(1.06);
        }

        .send-btn:active { transform: scale(0.96); }

        .auto-listen-btn {
            flex-shrink: 0;
            height: 32px;
            padding: 0 13px;
            border-radius: 16px;
            border: 1px solid rgba(0,212,255,0.22);
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .auto-listen-btn.on {
            border-color: rgba(0,212,255,0.55);
            color: var(--accent);
            background: rgba(0,212,255,0.08);
        }

        .apex-banner {
            position: fixed;
            top: 68px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(255,77,109,0.14);
            border: 1px solid rgba(255,77,109,0.4);
            border-radius: 10px;
            padding: 9px 18px;
            font-size: 12px;
            color: #ff8099;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .apex-banner-close {
            cursor: pointer;
            opacity: 0.6;
            font-size: 14px;
        }

        /* ══ PHASE 2 PANELS ════════════════════════════════════════════ */
        .right-panel { overflow-y: auto !important; }

        .subpanel {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 7px;
            border-top: 1px solid var(--glass-border);
            padding-top: 14px;
            margin-top: 4px;
        }

        .subpanel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2px;
        }

        .subpanel-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .subpanel-btn {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 8px;
            border: 1px solid rgba(0,212,255,0.28);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            transition: background 0.18s;
        }

        .subpanel-btn:hover { background: rgba(0,212,255,0.1); }

        /* Email items */
        .email-item {
            padding: 9px 11px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02);
            font-size: 11px;
        }

        .email-meta { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }

        .email-priority {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.1em;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .email-priority.urgent  { background: rgba(255,77,109,0.22); color: #ff4d6d; }
        .email-priority.normal  { background: rgba(0,212,255,0.12);  color: var(--accent); }
        .email-priority.low     { background: rgba(255,255,255,0.06); color: var(--muted); }

        .email-sender { font-size: 10px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
        .email-subject { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 3px; line-height: 1.35; }
        .email-summary { font-size: 10px; color: var(--muted); line-height: 1.4; }
        .email-actions { display: flex; gap: 6px; margin-top: 6px; }

        .email-btn {
            flex: 1;
            font-size: 10px;
            font-weight: 600;
            padding: 4px 0;
            border-radius: 6px;
            border: 1px solid;
            cursor: pointer;
            transition: opacity 0.15s;
        }

        .email-btn.approve { border-color: rgba(0,212,255,0.4); color: var(--accent); background: rgba(0,212,255,0.06); }
        .email-btn.reject  { border-color: rgba(255,77,109,0.3); color: #ff4d6d;      background: rgba(255,77,109,0.04); }
        .email-btn:hover   { opacity: 0.75; }

        /* Finance items */
        .finance-bar-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .finance-cat-row { display: flex; flex-direction: column; gap: 2px; }

        .finance-cat-label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: var(--muted);
        }

        .finance-cat-label span:last-child { color: var(--text); font-weight: 600; }

        .finance-bar-bg {
            height: 4px;
            border-radius: 2px;
            background: rgba(255,255,255,0.07);
            overflow: hidden;
        }

        .finance-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: var(--accent);
            transition: width 0.4s ease;
        }

        .finance-bar-fill.over { background: #ff4d6d; }

        /* Routine items */
        .routine-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 10px;
            border-radius: 9px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.02);
            font-size: 11px;
        }

        .routine-name { font-size: 11px; font-weight: 600; color: var(--text); }
        .routine-cron { font-size: 9px; color: var(--muted); margin-top: 2px; }

        .routine-toggle {
            width: 32px;
            height: 17px;
            border-radius: 9px;
            border: 1px solid rgba(0,212,255,0.3);
            background: rgba(255,255,255,0.05);
            cursor: pointer;
            position: relative;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .routine-toggle.on { background: rgba(0,212,255,0.25); border-color: var(--accent); }

        .routine-toggle::after {
            content: "";
            position: absolute;
            top: 2px; left: 2px;
            width: 11px; height: 11px;
            border-radius: 50%;
            background: rgba(255,255,255,0.35);
            transition: left 0.2s, background 0.2s;
        }

        .routine-toggle.on::after { left: 17px; background: var(--accent); }

        /* ══ UTILITY ════════════════════════════════════════════════════ */
        .empty-note {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            padding: 14px 0;
        }

        /* ══ RESPONSIVE ════════════════════════════════════════════════ */
        @media (max-width: 960px) {
            :root { --panel-w: 220px; }
        }

        @media (max-width: 700px) {
            :root {
                --topbar-h: 52px;
                --strip-h:  40px;
                --input-h:  68px;
            }

            html, body {
                overflow: hidden;
                overflow-x: hidden;
                max-width: 100vw;
                height: 100%;
            }

            .app {
                width: 100vw;
                max-width: 100vw;
                overflow-x: hidden;
                height: 100dvh; /* dynamic viewport height — accounts for iOS browser chrome */
                grid-template-columns: 1fr;
                grid-template-rows: var(--topbar-h) 1fr var(--strip-h) var(--input-h);
                grid-template-areas:
                    "topbar"
                    "centre"
                    "strip"
                    "inputz";
            }

            .left-panel, .right-panel { display: none; }

            /* Topbar — constrain to screen width */
            .topbar { padding: 0 16px; overflow: hidden; max-width: 100vw; }
            .clock-time { font-size: 17px; }
            .clock-date { font-size: 9px; }
            .brand-copy strong { font-size: 14px; }

            /* Orb — shrink to fit narrower screen */
            .orb { width: 148px; height: 148px; }
            .orb-name { font-size: 17px; }
            .pr1 { width: 190px; height: 190px; }
            .pr2 { width: 238px; height: 238px; }
            .pr3 { width: 284px; height: 284px; }
            .centre-halo { width: 300px; height: 300px; }

            /* Chat log */
            .chat-log { max-height: 40vh; padding: 0 12px; max-width: 100%; }
            .chat-status-bar { padding: 0 12px; font-size: 9px; }
            .chat-bubble { font-size: 12px; max-width: 92%; }

            /* Input bar — hide auxiliary buttons to prevent overflow */
            .input-area { padding: 0 12px; gap: 8px; overflow: hidden; max-width: 100vw; }
            .chat-input { font-size: 16px; min-width: 0; } /* 16px prevents iOS zoom; min-width:0 allows shrink */
            .clear-chat-btn { display: none; }
            .auto-listen-btn { display: none; }

            /* Notification strip */
            .notif-label { padding: 0 10px; font-size: 8px; }
            .notif-strip { overflow: hidden; max-width: 100vw; }

            /* Banner — prevent overflow on narrow screens */
            .apex-banner { max-width: calc(100vw - 32px); left: 16px; right: 16px; transform: none; }

            /* Modals full-width on mobile */
            .email-draft-box { width: 96vw; max-width: 96vw; }
            .cmd-box { width: 96vw; }
        }

        /* ══ COMMAND PALETTE ═══════════════════════════════════════════ */
        .cmd-palette {
            display: none;
            position: fixed; inset: 0; z-index: 9999;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            align-items: flex-start;
            justify-content: center;
            padding-top: 120px;
        }
        .cmd-palette.open { display: flex; }
        .cmd-box {
            width: min(560px, 92vw);
            background: rgba(10,10,16,0.96);
            border: 1px solid rgba(0,212,255,0.25);
            border-radius: 14px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,212,255,0.08);
            overflow: hidden;
        }
        .cmd-input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(0,212,255,0.12);
            color: var(--text);
            font-size: 16px;
            font-family: inherit;
            padding: 16px 20px;
            outline: none;
        }
        .cmd-input::placeholder { color: var(--muted); }
        .cmd-list { max-height: 340px; overflow-y: auto; padding: 6px; }
        .cmd-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            color: var(--text);
            transition: background 0.12s;
        }
        .cmd-item:hover, .cmd-item.active { background: rgba(0,212,255,0.1); }
        .cmd-item .cmd-icon { font-size: 18px; width: 24px; text-align: center; }
        .cmd-item .cmd-label { flex: 1; }
        .cmd-item .cmd-hint { font-size: 11px; color: var(--muted); }

        /* ══ DROP OVERLAY ══════════════════════════════════════════════ */
        .drop-overlay {
            display: none;
            position: fixed; inset: 0; z-index: 8888;
            background: rgba(0,212,255,0.08);
            border: 2px dashed rgba(0,212,255,0.5);
            border-radius: 12px;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .drop-overlay.active { display: flex; }
        /* ── Email draft confirmation modal ── */
        .email-draft-modal { display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.8); align-items:center; justify-content:center; }
        .email-draft-modal.active { display:flex; }
        .email-draft-box { background:#0f0f1a; border:1px solid rgba(0,212,255,0.35); border-radius:14px; padding:24px; width:min(540px,92vw); max-height:82vh; overflow-y:auto; display:flex; flex-direction:column; gap:14px; }
        .email-draft-title { font-size:13px; font-weight:700; color:#ff9f43; letter-spacing:0.1em; text-transform:uppercase; }
        .email-draft-not-sent { font-size:11px; color:#ff4d6d; font-weight:700; padding:5px 10px; background:rgba(255,77,109,0.12); border-radius:6px; border-left:3px solid #ff4d6d; }
        .email-draft-label { font-size:10px; color:var(--muted,#888); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:3px; }
        .email-draft-value { font-size:13px; color:#e0e0e0; padding:8px 10px; background:rgba(255,255,255,0.05); border-radius:7px; white-space:pre-wrap; word-break:break-word; line-height:1.5; }
        .email-draft-actions { display:flex; gap:10px; margin-top:4px; }
        .email-draft-btn { flex:1; padding:11px; border-radius:9px; border:none; cursor:pointer; font-size:13px; font-weight:700; transition:background 0.15s; }
        .email-draft-btn.send { background:#c0392b; color:#fff; }
        .email-draft-btn.send:hover { background:#e74c3c; }
        .email-draft-btn.cancel { background:rgba(255,255,255,0.08); color:#ccc; }
        .email-draft-btn.cancel:hover { background:rgba(255,255,255,0.15); }
        .email-draft-prompt-row { display:flex; gap:8px; margin-top:8px; }
        .email-draft-prompt-input { flex:1; padding:8px 10px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:7px; color:#e0e0e0; font-size:12px; font-family:inherit; outline:none; }
        .email-draft-prompt-input:focus { border-color:rgba(0,212,255,0.4); }
        .email-draft-btn.regenerate { flex:0 0 auto; background:rgba(0,212,255,0.12); color:var(--accent); border:1px solid rgba(0,212,255,0.25); padding:8px 14px; font-size:12px; border-radius:9px; cursor:pointer; font-weight:600; transition:background 0.15s; }
        .email-draft-btn.regenerate:hover { background:rgba(0,212,255,0.22); }
        textarea.email-draft-value { resize:vertical; min-height:120px; font-family:inherit; font-size:13px; color:#e0e0e0; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:7px; padding:8px 10px; line-height:1.5; width:100%; box-sizing:border-box; outline:none; }
        textarea.email-draft-value:focus { border-color:rgba(0,212,255,0.4); }
        .email-reply-row { margin-top:6px; }
        .email-btn.reply { background:rgba(0,212,255,0.12); color:var(--accent,#00d4ff); border:1px solid rgba(0,212,255,0.25); font-size:11px; padding:4px 10px; border-radius:6px; cursor:pointer; }
        .email-btn.reply:hover { background:rgba(0,212,255,0.22); }
        .drop-label {
            font-size: 20px;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 0.04em;
        }
        #httBtn { display: none !important; }
        .orb-recording {
            box-shadow: 0 0 0 6px rgba(255, 60, 60, 0.8), 0 0 40px rgba(255, 60, 60, 0.5) !important;
            animation: orbPulseRed 0.8s ease-in-out infinite alternate !important;
        }
        @keyframes orbPulseRed {
            from { box-shadow: 0 0 0 4px rgba(255, 60, 60, 0.7), 0 0 30px rgba(255, 60, 60, 0.4); }
            to   { box-shadow: 0 0 0 10px rgba(255, 60, 60, 0.9), 0 0 60px rgba(255, 60, 60, 0.7); }
        }
    </style>
</head>
<body>

<!-- ══ COMMAND PALETTE ══ -->
<div class="cmd-palette" id="cmdPalette" onclick="if(event.target===this)closeCommandPalette()">
    <div class="cmd-box">
        <input class="cmd-input" id="cmdInput" placeholder="Search commands…" oninput="renderCmdList(this.value)" onkeydown="cmdKeyNav(event)" autocomplete="off" spellcheck="false">
        <div class="cmd-list" id="cmdList"></div>
    </div>
</div>

<!-- ══ DROP OVERLAY ══ -->
<div class="drop-overlay" id="dropOverlay"><span class="drop-label">Drop file to upload</span></div>

<div class="app">

    <!-- ══ TOP BAR ══ -->
    <header class="topbar">
        <div class="brand">
            <div class="brand-ring"><div class="brand-ring-dot"></div></div>
            <div class="brand-copy">
                <strong>APEX</strong>
                <span>Autonomous AI</span>
            </div>
        </div>

        <div class="topbar-clock">
            <div class="clock-time" id="clockTime">--:--:--</div>
            <div class="clock-date" id="clockDate">--</div>
        </div>

        <div class="topbar-status">
            <div class="status-dot" id="connDot"></div>
            <span id="connLabel">Online</span>
        </div>
    </header>

    <!-- ══ LEFT: Memory ══ -->
    <aside class="side-panel left-panel">
        <div class="panel-label">Memory</div>
        <div class="memory-scroll" id="memoryList">
            <div class="empty-note">Loading…</div>
        </div>
    </aside>

    <!-- ══ CENTRE: Orb + Chat ══ -->
    <main class="centre">
        <div class="centre-halo"></div>

        <div class="orb-shell" id="orbShell">
            <div class="pulse-ring pr1"></div>
            <div class="pulse-ring pr2"></div>
            <div class="pulse-ring pr3"></div>
            <div class="orb" id="orb" onclick="toggleListening()" title="Click to speak">
                <div class="orb-name">APEX</div>
                <div class="orb-sub">AI System</div>
            </div>
        </div>

        <div class="waveform" id="waveform">
            <div class="wb"></div><div class="wb"></div><div class="wb"></div>
            <div class="wb"></div><div class="wb"></div><div class="wb"></div>
            <div class="wb"></div>
        </div>

        <div class="orb-status" id="orbStatus">Ready</div>
        <div id="orbHint" style="display:none; color:rgba(0,212,255,0.5); font-size:12px; letter-spacing:2px; text-transform:uppercase; margin-top:8px; text-align:center;">HOLD ORB TO SPEAK</div>

        <div class="chat-status-bar" id="chatStatusBar">Apex · Connecting…</div>

        <div class="chat-log" id="chatLog">
            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
    </main>

    <!-- ══ RIGHT: Approval Queue + Phase 2 Panels ══ -->
    <aside class="side-panel right-panel">

        <!-- Approval Queue -->
        <div class="panel-label">Approval Queue</div>
        <div class="queue-scroll" id="approvalQueue" style="max-height:200px">
            <div class="queue-empty">
                <div class="queue-empty-icon">✓</div>
                <div class="queue-empty-text">No pending</div>
            </div>
        </div>

        <!-- Email Panel -->
        <div class="subpanel">
            <div class="subpanel-header">
                <span class="subpanel-label">Email</span>
                <button class="subpanel-btn" onclick="checkEmailNow()">Check</button>
            </div>
            <div id="emailList"><div class="empty-note">Loading…</div></div>
        </div>

        <!-- Finance Panel -->
        <div class="subpanel">
            <div class="subpanel-header">
                <span class="subpanel-label">Finance</span>
                <button class="subpanel-btn" onclick="logExpenseQuick()">+ Expense</button>
            </div>
            <div id="financePanel"><div class="empty-note">Loading…</div></div>
        </div>

        <!-- Routines Panel -->
        <div class="subpanel">
            <div class="subpanel-header">
                <span class="subpanel-label">Routines</span>
                <button class="subpanel-btn" onclick="addRoutineQuick()">+ Add</button>
            </div>
            <div id="routinesPanel"><div class="empty-note">Loading…</div></div>
        </div>

    </aside>

    <!-- ══ NOTIFICATION STRIP ══ -->
    <div class="notif-strip">
        <div class="notif-label">Alerts</div>
        <div class="notif-scroll" id="notifScroll">
            <span class="notif-none">Loading…</span>
        </div>
    </div>

    <!-- ══ INPUT ══ -->
    <div class="input-area">
        <button class="mic-btn" id="micBtn" onclick="toggleListening()" title="Voice input">🎤</button>
        <input class="chat-input" id="chatInput" type="text" placeholder="Ask APEX anything…" autocomplete="off" />
        <button class="clear-chat-btn" onclick="clearChat()" title="Clear chat">Clear</button>
        <button class="auto-listen-btn on" id="autoListenBtn" onclick="toggleAutoListen()" title="Toggle auto-listen">Auto-listen: ON</button>
        <button class="send-btn" onclick="sendChatCommand()" title="Send">&#10148;</button>
    </div>

</div><!-- .app -->

<script>
// ══ CONFIG ════════════════════════════════════════════════════════════
const API_BASE = "https://ai-os-server-jx20.onrender.com";
const APP_KEY  = new URLSearchParams(window.location.search).get("app_key") || "";
const MAX_ITEMS           = 5;
const REFRESH_INTERVAL_MS = 18000;

// ══ STATE ═════════════════════════════════════════════════════════════
let isListening         = false;
let _manualStart        = false;
const _isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
let autoListen          = _isTouchDevice;
let lastSendWasVoice    = false;
let cachedTasks         = [];
let cachedNotifications = [];
let srec                = null;   // SpeechRecognition instance
let dgStream            = null;   // mic MediaStream (for AnalyserNode + VAD)
let dgMuted             = false;  // true while AI is speaking — ignore SR transcripts
let currentAudio        = null;
let currentAbort        = null;
let speakQueue          = [];
let isSpeakingNow       = false;
let vadAnalyser         = null;
let vadInterval         = null;
let dgAnalyser          = null;   // AnalyserNode for visual UI
let dgAudioCtx          = null;   // AudioContext for analyser
let _apexAudio          = null;   // Persistent Audio element, created + unlocked on first touch

// ── HOLD-TO-TALK PIPELINE (iOS) ──────────────────────────────────────────
let _httStream      = null;
let _httRecorder    = null;
let _httChunks      = [];
let _httActive      = false;
let _httUtter       = null;
let _httAudio       = null;
let _httSafetyTimer = null;

async function _httBegin() {
    // Force reset any leftover state from previous session
    _httActive = false;
    _httChunks = [];
    if (_httSafetyTimer) { clearTimeout(_httSafetyTimer); _httSafetyTimer = null; }
    if (_httRecorder && _httRecorder.state !== 'inactive') {
        try { _httRecorder.onstop = null; _httRecorder.stop(); } catch(_) {}
    }
    _httRecorder = null;
    if (_httStream) {
        try { _httStream.getTracks().forEach(t => t.stop()); } catch(_) {}
        _httStream = null;
    }
    if (_apexAudio) {
        try { _apexAudio.pause(); _apexAudio.onended = null; _apexAudio.onerror = null; } catch(_) {}
    }
    isSpeakingNow = false;
    if (_httActive) return;
    _httActive = true;
    _httChunks = [];

    setOrbState('listening');
    console.log('[HTT] press — starting recording');

    try {
        if (navigator.audioSession) navigator.audioSession.type = 'play-and-record';
        _httStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true }
        });

        const mime = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
        _httRecorder = new MediaRecorder(_httStream, { mimeType: mime });

        _httRecorder.ondataavailable = ev => {
            if (ev.data && ev.data.size > 0) _httChunks.push(ev.data);
        };

        _httRecorder.onstop = async () => {
            // Step 1: stop ALL tracks immediately — releases AVAudioSession
            if (_httStream) {
                _httStream.getTracks().forEach(t => t.stop());
                _httStream = null;
            }

            if (!_httChunks.length) {
                setOrbState('waiting');
                console.log('[HTT] nothing recorded');
                return;
            }

            setOrbState('thinking');

            try {
                const blob = new Blob(_httChunks, { type: _httRecorder.mimeType });
                _httChunks = [];

                // Transcribe via Deepgram
                const fd = new FormData();
                fd.append('audio', blob, 'recording.mp4');
                fd.append('mimeType', _httRecorder.mimeType);

                const tRes  = await fetch(buildApiUrl('/api/transcribe'), { method: 'POST', body: fd });
                const tData = await tRes.json();
                const transcript = (tData.transcript || '').trim();

                console.log('[HTT] transcript:', transcript);

                if (!transcript) {
                    setOrbState('waiting');
                    return;
                }

                renderChatMessage('user', transcript);

                // Get AI reply
                const aRes  = await fetch(buildApiUrl('/api/voice-chat'), {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: transcript })
                });
                const aData = await aRes.json();
                const reply = (aData.reply || '').trim();

                if (!reply) { setOrbState('waiting'); return; }

                renderChatMessage('ai', reply);

                // Reset audio session from play-and-record to playback.
                // iOS keeps the session in play-and-record after getUserMedia
                // even after all tracks are stopped. speechSynthesis cannot
                // acquire the loudspeaker while the session is play-and-record.
                if (navigator.audioSession) {
                    try { navigator.audioSession.type = 'playback'; } catch(_) {}
                }
                // Wait 1000ms for iOS to fully release the audio session.
                await new Promise(r => setTimeout(r, 1000));
                _httSpeak(reply);

            } catch (err) {
                console.error('[HTT] pipeline error:', err);
                setOrbState('waiting');
            }
        };

        _httRecorder.start();
        console.log('[HTT] MediaRecorder started, mime:', mime);

    } catch (err) {
        console.error('[HTT] getUserMedia error:', err);
        _httActive = false;
        setOrbState('waiting');
    }
}

function _httEnd() {
    if (!_httActive) return;
    _httActive = false;
    console.log('[HTT] release — stopping recording');

    if (_httRecorder && _httRecorder.state === 'recording') {
        try { _httRecorder.stop(); } catch(_) {}
    } else if (_httStream) {
        _httStream.getTracks().forEach(t => t.stop());
        _httStream = null;
        setOrbState('waiting');
    }
}

function _httSpeak(text) {
    if (!text) return;
    isSpeakingNow = true;
    setOrbState('speaking');
    console.log('[HTT] fetching TTS audio for:', text.substring(0, 60));
    if (_httAudio) { try { _apexAudio.pause(); _apexAudio.src = ''; } catch(_) {} _httAudio = null; }
    if (_httSafetyTimer) { clearTimeout(_httSafetyTimer); _httSafetyTimer = null; }
    const wordCount = text.trim().split(/\s+/).length;
    const safetyMs  = Math.min(60000, Math.max(8000, wordCount * 1000 + 6000));
    fetch(buildApiUrl('/api/tts'), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text })
    })
    .then(res => {
        if (!res.ok) throw new Error('TTS request failed: ' + res.status);
        return res.blob();
    })
    .then(blob => {
        const url = URL.createObjectURL(blob);
        _httAudio = _apexAudio;
        _httAudio.src = url;
        _httAudio.load();
        _httAudio.playbackRate = _isTouchDevice ? 1.3 : 1.5;
        _httSafetyTimer = setTimeout(() => {
            console.warn('[HTT] audio safety timeout — cleaning up');
            if (_httAudio) { try { _apexAudio.pause(); _apexAudio.src = ''; } catch(_) {} _httAudio = null; }
            URL.revokeObjectURL(url);
            isSpeakingNow = false;
            _httActive = false;
            setOrbState('waiting');
        }, safetyMs);
        _httAudio.oncanplaythrough = () => { console.log('[HTT] audio can play — starting'); };
        _httAudio.onplay = () => { console.log('[HTT] audio playing audibly'); };
        _httAudio.onended = () => {
            clearTimeout(_httSafetyTimer); _httSafetyTimer = null;
            URL.revokeObjectURL(url); _httAudio = null;
            isSpeakingNow = false; _httActive = false; setOrbState('waiting');
            console.log('[HTT] audio ended naturally');
        };
        _httAudio.onerror = (e) => {
            clearTimeout(_httSafetyTimer); _httSafetyTimer = null;
            URL.revokeObjectURL(url); _httAudio = null;
            isSpeakingNow = false; _httActive = false; setOrbState('waiting');
            console.error('[HTT] audio element error:', e);
        };
        _httAudio.play().then(() => {
            console.log('[HTT] play() promise resolved');
        }).catch(err => {
            console.error('[HTT] play() rejected:', err.message);
            clearTimeout(_httSafetyTimer); _httSafetyTimer = null;
            URL.revokeObjectURL(url); _httAudio = null;
            isSpeakingNow = false; setOrbState('waiting');
        });
    })
    .catch(err => {
        console.error('[HTT] TTS fetch error:', err.message);
        if (_httSafetyTimer) { clearTimeout(_httSafetyTimer); _httSafetyTimer = null; }
        isSpeakingNow = false; setOrbState('waiting');
    });
}

// ══ UTILITIES ═════════════════════════════════════════════════════════
function buildApiUrl(path) {
    if (!APP_KEY) return `${API_BASE}${path}`;
    const sep = path.includes("?") ? "&" : "?";
    return `${API_BASE}${path}${sep}app_key=${encodeURIComponent(APP_KEY)}`;
}

function buildApiHeaders(extra = {}) {
    return APP_KEY ? { ...extra, "x-app-key": APP_KEY } : extra;
}

function escapeHtml(v) {
    const d = document.createElement("div");
    d.textContent = v == null ? "" : String(v);
    return d.innerHTML;
}

function shortenText(v, max = 64) {
    const t = String(v || "").trim();
    return t.length > max ? t.slice(0, max - 1) + "…" : t || "Untitled";
}

function formatTimestamp(v) {
    if (!v) return "";
    const d = new Date(v);
    return isNaN(d.getTime()) ? "" : d.toLocaleString();
}

async function fetchJson(path, options = {}) {
    const res = await fetch(buildApiUrl(path), {
        ...options,
        headers: buildApiHeaders({ Accept: "application/json", ...(options.headers || {}) })
    });
    const ct   = res.headers.get("content-type") || "";
    const text = await res.text();
    if (!ct.toLowerCase().includes("application/json")) {
        throw new Error(`Expected JSON from ${path}.`);
    }
    let data;
    try { data = text ? JSON.parse(text) : {}; } catch { throw new Error(`Invalid JSON from ${path}.`); }
    if (!res.ok) throw new Error(data.reply || data.error || "Request failed.");
    return data;
}

async function runRefresh(key, fn) {
    if (inFlightRefreshes[key]) return inFlightRefreshes[key];
    inFlightRefreshes[key] = (async () => {
        try { return await fn(); } finally { delete inFlightRefreshes[key]; }
    })();
    return inFlightRefreshes[key];
}

function setOrbState(state) {

    const statusEl = document.getElementById("orbStatus");
    const waveform = document.getElementById("waveform");

    waveform.classList.remove("active");

        shell.classList.add("active");

        shell.classList.add("waiting");
    }
}

let _selectedVoice = null;

function _pickVoice() {
    if (!window.speechSynthesis) return null;
    const vv = window.speechSynthesis.getVoices();
    if (!vv.length) return null;
    _selectedVoice =
        vv.find(v => /google uk english male/i.test(v.name))                         ||
        vv.find(v => /google us english/i.test(v.name))                              ||
        vv.find(v => /microsoft ryan online.*english.*united kingdom/i.test(v.name)) ||
        vv.find(v => /microsoft guy online.*natural/i.test(v.name))                  ||
        vv.find(v => v.lang === "en-GB" && /male/i.test(v.name))                     ||
        vv.find(v => v.lang === "en-US" && /male/i.test(v.name))                     ||
        vv.find(v => v.lang.startsWith("en") && /male/i.test(v.name))               ||
        vv.find(v => v.lang === "en-GB")                                              ||
        vv.find(v => v.lang === "en-US")                                              ||
        vv.find(v => v.lang.startsWith("en"))                                         ||
        vv[0];
    console.log(`[Voice] picked voice: "${_selectedVoice ? _selectedVoice.name : 'none'}" (${vv.length} available)`);
    return _selectedVoice;
}

if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => {
        console.log('[Voice] voiceschanged fired');
        _pickVoice();
    };
    _pickVoice();
    // iOS PWA voices are not available at parse time — re-pick after 500ms
    setTimeout(_pickVoice, 500);
}

function cleanForSpeech(text) {
    return String(text || "")
        .replace(/\[APPROVAL REQUIRED\]/gi, "")
        .replace(/#{1,6}\s*/g, "")
        .replace(/\*\*(.+?)\*\*/g, "$1")
        .replace(/\*(.+?)\*/g, "$1")
        .replace(/~~(.+?)~~/g, "$1")
        .replace(/`{1,3}[^`]*`{1,3}/g, "")
        .replace(/!\[.*?\]\(.*?\)/g, "")
        .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1")
        .replace(/\[[^\]]*\]/g, "")
        .replace(/\([^)]{1,60}\)/g, "")
        .replace(/https?:\/\/\S+/g, "")
        .replace(/[\u{1F300}-\u{1FAFF}]/gu, "")
        .replace(/[\u{2600}-\u{26FF}]/gu, "")
        .replace(/[\u{2700}-\u{27BF}]/gu, "")
        .replace(/\b[\w.-]+\.(txt|md|js|ts|json|csv|pdf|png|jpg|jpeg|html|py|sh)\b/gi, "")
        .replace(/£(\d[\d.,]*)/g, "$1 pounds")
        .replace(/\$(\d[\d.,]*)/g, "$1 dollars")
        .replace(/€(\d[\d.,]*)/g, "$1 euros")
        .replace(/^[-•*+]\s+/gm, ", ")
        .replace(/^\d+\.\s+/gm, "")
        .replace(/→/g, "to")
        .replace(/&/g, "and")
        .replace(/\n+/g, " ")
        .replace(/\s{2,}/g, " ")
        .trim();
}

function _firstSentence(text) {
    const m = text.match(/^.+?[.!?](?=\s|$)/);
    return m ? m[0].trim() : text.split(" ").slice(0, 30).join(" ");
}

function _firstTwoSentences(text) {
    const parts = text.match(/[^.!?]+[.!?](?:\s|$)/g);
    if (!parts) return text.split(" ").slice(0, 50).join(" ");
    return (parts.slice(0, 2).join("")).trim();
}

function summariseForSpeech(raw) {
    const clean = cleanForSpeech(raw);
    if (clean.length < 100) return clean;

    const t = clean.toLowerCase();

    if (clean.length >= 300) {
        if (/saved|note saved|stored/.test(t))                         return "Got it, saved.";
        if (/\bdeleted\b|\bremoved\b/.test(t))                         return "Done, removed.";
        if (/file created|created/.test(t))                            return "Created.";
        if (/renamed/.test(t))                                         return "Renamed.";
        if (/error|could not|couldn't|failed|unable/.test(t))          return "Something went wrong, please try again.";
        if (/here are|found|results|documents/.test(t) || /\?/.test(clean)) return _firstSentence(clean);
        return _firstTwoSentences(clean);
    }

    // 100-299 chars — short enough to speak in full
    return clean;
}

const FILLERS = [
    { text: null, weight: 100 },
];

function _pickFiller() {
    const roll = Math.random() * 100;
    let acc = 0;
    for (const f of FILLERS) { acc += f.weight; if (roll < acc) return f.text; }
    return null;
}

function _speakUtterance(phrase, { onStart, onEnd } = {}) {
    const utt = new SpeechSynthesisUtterance(phrase);
    utt.rate   = 1.08;
    utt.pitch  = 0.95;
    utt.volume = 1;
    const voice = _selectedVoice || _pickVoice();
    if (voice) utt.voice = voice;
    if (onStart) utt.onstart = onStart;
    if (onEnd)   utt.onend   = onEnd;
    utt.onerror = () => {};
    window.speechSynthesis.speak(utt);
}

// Minimal silent WAV for unlocking the Audio element in iOS PWA (data URI works offline, no CORS)
const _SILENT_WAV = 'data:audio/wav;base64,UklGRiUAABXQVZFZm10IBAAAAAABAAEARKwAAESsAAABAAgAZGF0YQEAAACA';

// First user gesture — unlock audio, speech synthesis, and start iOS PWA voice pipeline.
// getUserMedia on iOS PWA requires a user gesture, so we start the pipeline here.
document.addEventListener('touchstart', async () => {
    // ── Audio element: data URI + load() + play() is the required iOS unlock sequence ──
    if (!_apexAudio) {
        _apexAudio = new Audio();
        _apexAudio.src = _SILENT_WAV;
        _apexAudio.load();
        _apexAudio.play().catch(() => {});
        console.log('[iOS] audio element unlocked');
    }
    // ── Speech synthesis: silent utterance inside a gesture primes all subsequent speak() calls ──
    if (window.speechSynthesis) {
        const u = new SpeechSynthesisUtterance('');
        u.volume = 0;
        window.speechSynthesis.speak(u);
        console.log('[iOS] speechSynthesis unlocked');
    }
    // ── iOS PWA: start voice pipeline on first gesture (getUserMedia requires gesture) ──
    if (isIOSPWA && !_iosPWARunning && autoListen) {
        if (false) { await _iosPWAStartPipeline(); }
    }
}, { once: true });

async function speakWithElevenLabs(text) {
    const phrase = summariseForSpeech(text);
    if (!phrase) return false;

    // On desktop _apexAudio may not be created yet (no touchstart fired) — create it now.
    if (!_apexAudio) _apexAudio = new Audio();

    try {
        console.log(`[LATENCY] +${Date.now() - _t0Voice}ms ElevenLabs request sent`);
        const ac = new AbortController();
        currentAbort = ac;
        const fetchRes = await fetch(buildApiUrl("/api/speak"), {
            method: "POST",
            headers: buildApiHeaders({ "Content-Type": "application/json" }),
            body: JSON.stringify({ text: phrase }),
            signal: ac.signal,
            credentials: "same-origin"
        });
        if (!fetchRes.ok) return false;

        // arrayBuffer → Blob approach is the only path that reliably works on iOS Safari
        const buf  = await fetchRes.arrayBuffer();
        const blob = new Blob([buf], { type: "audio/mpeg" });

        // Revoke the previous blob URL before creating the new one
        if (_apexBlobUrl) { try { URL.revokeObjectURL(_apexBlobUrl); } catch (_) {} }
        _apexBlobUrl = URL.createObjectURL(blob);

        _apexAudio.src          = _apexBlobUrl;
        _apexAudio.playbackRate = _isTouchDevice ? 1.3 : voiceSpeed;
        currentAudio = _apexAudio;
        console.log(`[LATENCY] +${Date.now() - _t0Voice}ms audio playing`);

        await new Promise((res2, rej) => {
            const cleanup = () => { _apexAudio.onended = _apexAudio.onerror = _apexAudio.onpause = null; };
            _apexAudio.onended = () => {
                cleanup();
                currentAudio = null;
                console.log(`[Speak] audio ended — isSpeakingNow:${isSpeakingNow} queue:${speakQueue.length}`);
                if (isSpeakingNow && !speakQueue.length) {
                    isSpeakingNow = false;
                    clearTimeout(_speakSafetyTimer); _speakSafetyTimer = null;
                    dgMuted = false;
                    console.log('[Speak] speaking ended → unmuteDeepgram, 3s silence countdown begins');
                    unmuteDeepgram();
                }
                res2(true);
            };
            _apexAudio.onerror = () => { cleanup(); currentAudio = null; rej(); };
            _apexAudio.onpause = () => { cleanup(); currentAudio = null; res2(false); };
            _apexAudio.load();
            if (isIOSPWA) console.log('[iOS] audio playing');
            _apexAudio.play().catch(e => { if (isIOSPWA) console.error('[iOS] play() error:', e.message || String(e)); cleanup(); currentAudio = null; rej(e); });
        });
        return true;

    } catch (_) {
        return false;
    }
}

function _speakFallback(phrase, { onEnd } = {}) {
    if (isIOSPWA) console.log("[APEX iOS] _speakFallback called, text:", phrase.slice(0, 50));
    window.speechSynthesis.cancel();
    if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }
    const utt = new SpeechSynthesisUtterance(phrase);
    utt.rate = 1.08; utt.pitch = 0.95; utt.volume = 1;
    const voice = _selectedVoice || _pickVoice();
    if (voice) utt.voice = voice;
    console.log(`[Speak] speechSynthesis fallback — voice:"${voice ? voice.name : 'default'}" phrase:"${phrase.slice(0, 60)}"`);
    utt.onstart = () => { console.log('[Speak] speechSynthesis started'); };
    utt.onend   = () => {
        console.log('[Speak] speechSynthesis ended');
        if (onEnd) onEnd();
    };
    utt.onerror = (ev) => {
        console.warn('[Speak] speechSynthesis error:', ev.error);
        if (onEnd) onEnd();
    };
    if (isIOSPWA) console.log(`[iOS] speechSynthesis speaking: "${phrase.slice(0, 60)}"`);
    if (isIOSPWA && 'audioSession' in navigator) navigator.audioSession.type = 'play-and-record';
    setTimeout(() => { console.log("[APEX iOS] speechSynthesis.speak fired"); window.speechSynthesis.speak(utt); }, 100);
}
