async function _speakInternal(text, useFiller) {
    try {
        muteDeepgram();
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        const phrase = summariseForSpeech(text);
        if (!phrase) return;

        setOrbState("speaking");
        const filler = useFiller ? _pickFiller() : null;

        if (filler) {
            const fillerOk = await speakWithElevenLabs(filler);
            if (!fillerOk && isSpeakingNow) {
                if (isIOSPWA) await new Promise(r => setTimeout(r, 500));
                await new Promise(r => _speakFallback(filler, { onEnd: r }));
            }
        }

        const ok = await speakWithElevenLabs(phrase);
        if (!ok && isSpeakingNow) {
            if (isIOSPWA) await new Promise(r => setTimeout(r, 500));
            await new Promise(r => _speakFallback(phrase, { onEnd: r }));
        }
    } catch (_) {}
}

async function _processSpeak() {
    if (isSpeakingNow || !speakQueue.length) return;
    isSpeakingNow = true;
    console.log('[Speak] speaking started');
    if (srec && _isTouchDevice) { try { srec.stop(); } catch (_) {} }

    // Safety watchdog: force-reset speaking state after 30 seconds
    _speakSafetyTimer = setTimeout(() => {
        if (!isSpeakingNow) return;
        console.warn('[Speak] safety timeout — forcing isSpeakingNow reset');
        speakQueue.length = 0;
        isSpeakingNow = false;
        _speakSafetyTimer = null;
        if (currentAbort) { currentAbort.abort(); currentAbort = null; }
        if (currentAudio) { try { currentAudio.pause(); } catch (_) {} currentAudio = null; }
        dgMuted = false;
        console.log('[Speak] safety timer → unmuteDeepgram, 3s silence countdown begins');
        unmuteDeepgram();
        setOrbState(autoListen && isListening ? (dgMode === "conversation" ? "listening" : "waiting") : "ready");
    }, isIOSPWA ? Math.min(8000, Math.max(2500, ((speakQueue[0] && speakQueue[0].text ? speakQueue[0].text.split(' ').length : 3) * 500) + 2000)) : 30000);

    while (speakQueue.length) {
        const { text, useFiller } = speakQueue.shift();
        await _speakInternal(text, useFiller);
    }

    clearTimeout(_speakSafetyTimer);
    _speakSafetyTimer = null;
    _vadDebounceStart = null;
    isSpeakingNow = false;
    _postSpeakLockUntil = Date.now() + 800;
    console.log('[Speak] queue empty — speaking ended, unmuteDeepgram');
    // dgSilenceTimer owns standby transitions — do not set dgMode here
    if (isListening) {
        unmuteDeepgram();
        if (!srec) {
            _manualStart = true;
            startVoicePipeline();
        } else {
            try { srec.start(); } catch (_) {}
            setOrbState(dgMode === "conversation" ? "listening" : "waiting");
        }
    } else {
        setOrbState("ready");
    }
}

function speak(text, { useFiller = false } = {}) {
    speakQueue.push({ text, useFiller });
    _processSpeak();
}

function startVAD() {
    stopVAD();
    if (!dgStream || !dgAudioCtx) return;
    try {
        const source = dgAudioCtx.createMediaStreamSource(dgStream);
        vadAnalyser  = dgAudioCtx.createAnalyser();
        vadAnalyser.fftSize = 256;
        source.connect(vadAnalyser);
        const buf = new Float32Array(vadAnalyser.fftSize);

        vadInterval = setInterval(() => {
            if (!isSpeakingNow) { stopVAD(); return; }
            vadAnalyser.getFloatTimeDomainData(buf);
            let sum = 0;
            for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
            const rms = Math.sqrt(sum / buf.length);
            const db  = rms > 0 ? 20 * Math.log10(rms) : -Infinity;
            if (db > -50) {
                console.log("User interrupt detected — stopping audio", db.toFixed(1), "dB");
                stopVAD();
                interruptSpeech();
            }
        }, 80);
    } catch (e) {
        console.warn("[VAD] could not start:", e.message);
    }
}

function stopVAD() {
    if (vadInterval) { clearInterval(vadInterval); vadInterval = null; }
    if (vadAnalyser) { try { vadAnalyser.disconnect(); } catch (_) {} vadAnalyser = null; }
}

function _startInterruptSR() {
    if (_vadInterruptSR) return;
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR || !isSpeakingNow) return;
    console.log("[VAD] starting dedicated interrupt SR");
    const r = new SR();
    r.continuous   = false;
    r.interimResults = false;
    r.lang         = "en-GB";
    _vadInterruptSR = r;

    r.onresult = ev => {
        if (!ev.results[ev.resultIndex].isFinal) return;
        const transcript = ev.results[ev.resultIndex][0].transcript.trim();
        const wordCount = transcript.trim().split(/\s+/).filter(w => w.length >= 2).length;
        console.log(`[VAD] interrupt SR: ${wordCount} words — "${transcript}"`);
        if (wordCount >= 2 && isSpeakingNow) {
            _vadInterruptSR = null;
            interruptSpeech();
            document.getElementById("chatInput").value = transcript;
            lastSendWasVoice = true;
            dgMuted = true;
            sendVoiceChatCommand(transcript);
        }
        // < 2 words: discard — Apex keeps speaking
    };
    r.onerror = () => { _vadInterruptSR = null; };
    r.onend   = () => { _vadInterruptSR = null; };
    try { r.start(); } catch (e) { _vadInterruptSR = null; console.warn("[VAD] interrupt SR start failed:", e.message); }
}

function interruptSpeech() {
    console.log("Interrupted");
    clearTimeout(_speakSafetyTimer); _speakSafetyTimer = null;
    _vadDebounceStart = null;
    if (_vadInterruptSR) { try { _vadInterruptSR.abort(); } catch (_) {} _vadInterruptSR = null; }
    stopVAD();
    if (currentAbort) { currentAbort.abort(); currentAbort = null; }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (currentAudio) { try { currentAudio.pause(); } catch (_) {} currentAudio = null; }
    speakQueue.length = 0;
    isSpeakingNow = false;
    dgMuted = false;
    unmuteDeepgram();
    if (srec && autoListen) { try { srec.start(); } catch (_) {} }
    setOrbState(isListening ? (dgMode === "conversation" ? "listening" : "waiting") : "ready");
}

// ══ VOICE INPUT ═══════════════════════════════════════════════════════
function _showBanner(id, html) {
    if (document.getElementById(id)) return;
    const el = document.createElement("div");
    el.id = id;
    el.className = "apex-banner";
    el.innerHTML = html + `<span class="apex-banner-close" onclick="document.getElementById('${id}').remove()">✕</span>`;
    document.body.appendChild(el);
}

// ══ iOS PWA VOICE PIPELINE ═══════════════════════════════════════════════════
// Uses getUserMedia → AnalyserNode VAD → MediaRecorder → POST /api/transcribe
// webkitSpeechRecognition is NOT used on iOS PWA (unreliable in standalone mode).

async function _iosPWAStartPipeline() {
    if (_iosPWARunning || !autoListen) return;
    if (_iosPWACycleInterval) { clearInterval(_iosPWACycleInterval); _iosPWACycleInterval = null; }
    if (_iosPWAWatchdogInterval) { clearInterval(_iosPWAWatchdogInterval); _iosPWAWatchdogInterval = null; }
    console.log("[APEX iOS] _iosPWAStartPipeline started");
    console.log('[iOS PWA] pipeline starting');
    try {
        if ('audioSession' in navigator) {
            navigator.audioSession.type = 'play-and-record';
            console.log('[APEX iOS] audioSession set to play-and-record');
        }
        _iosPWAStream = await navigator.mediaDevices.getUserMedia({
            audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true },
            video: false
        });
    } catch (e) {
        console.error('[iOS PWA] getUserMedia failed:', e.message);
        console.log("[APEX iOS] ERROR:", e.message);
        _showBanner("banner-micdenied", "Microphone access denied.");
        return;
    }
    console.log(`[iOS PWA] getUserMedia granted — tracks: ${_iosPWAStream.getTracks().length}`);
    console.log("[APEX iOS] getUserMedia granted, stream active");
    _iosPWAAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_iosPWAAudioCtx.state === "suspended") await _iosPWAAudioCtx.resume().catch(() => {});

    const iOSMimeType = ['audio/mp4', 'audio/aac', 'audio/webm;codecs=opus', 'audio/webm'].find(t => MediaRecorder.isTypeSupported(t)) || 'audio/mp4';
    console.log("[APEX iOS] Selected mimeType:", iOSMimeType);

    let iOSChunks = [];
    _iosPWACycleInterval = null;
    const iOSRecorder = new MediaRecorder(_iosPWAStream, { mimeType: iOSMimeType });
    _iosPWAActiveRecorder = iOSRecorder;

    iOSRecorder.ondataavailable = (event) => {
        if (event.data && event.data.size > 0) {
            iOSChunks.push(event.data);
            console.log("[APEX iOS] chunk accumulated, size:", event.data.size, "total:", iOSChunks.length);
        }
    };

    iOSRecorder.onstop = async () => {
        console.log("[APEX iOS] onstop fired, chunks:", iOSChunks.length);
        if (_iosPWASpeaking) {
            console.log('[APEX iOS] onstop during speech — discarding, waiting for unmuteDeepgram to restart');
            iOSChunks = [];
            return;
        }
        const chunksToSend = iOSChunks.slice();
        iOSChunks = [];

        if (chunksToSend.length > 0) {
            const blob = new Blob(chunksToSend, { type: iOSMimeType });
            console.log("[APEX iOS] Sending complete blob, size:", blob.size, "type:", iOSMimeType);
            try {
                const fd = new FormData();
                fd.append("audio", blob, "audio.mp4");
                fd.append("mimeType", iOSMimeType);
                const res = await fetch("/api/transcribe", { method: "POST", body: fd });
                const data = await res.json();
                const transcript = (data.transcript || "").trim();
                console.log("[APEX iOS] Transcript:", transcript);
                if (transcript) {
                    _iosPWAHandleTranscript(transcript);
                }
            } catch (err) {
                console.log("[APEX iOS] Transcribe error:", err.message);
            }
        }

        if (_iosPWASpeaking) { console.log('[APEX iOS] onstop — speaking active, skipping recorder restart'); return; }
        // Always restart — even on empty or error — to keep the cycle alive
        try {
            if (iOSRecorder.state === "inactive") {
                iOSRecorder.start();
                _iosPWAActiveRecorder = iOSRecorder;
                console.log("[APEX iOS] Recorder restarted");
            }
        } catch (startErr) {
            console.log("[APEX iOS] Restart error:", startErr.message);
            if (_iosPWACycleInterval) clearInterval(_iosPWACycleInterval);
            _iosPWARunning = false;
            setTimeout(() => { if (false) { _iosPWAStartPipeline(); } }, 2000);
        }
    };

    iOSRecorder.onerror = (err) => {
        console.log("[APEX iOS] Recorder error:", err.error ? err.error.message : String(err));
        iOSChunks = [];
        if (_iosPWACycleInterval) clearInterval(_iosPWACycleInterval);
        _iosPWARunning = false;
        setTimeout(() => { if (false) { _iosPWAStartPipeline(); } }, 2000);
    };

    iOSRecorder.start();
    console.log("[APEX iOS] Recorder started, beginning 4 second cycle");

    _iosPWACycleInterval = setInterval(() => {
        if (iOSRecorder.state === "recording") {
            iOSRecorder.stop();
            _iosPWALastStopTs = Date.now();
        }
    }, 4000);

    _iosPWAWatchdogInterval = setInterval(() => {
        if (_iosPWASpeaking) return;
        if (_iosPWALastStopTs !== 0 && Date.now() - _iosPWALastStopTs > 5500 && _iosPWAActiveRecorder && _iosPWARunning && _iosPWAActiveRecorder.state !== "recording") {
            console.log("[APEX iOS] watchdog: onstop did not fire — restarting recorder");
            iOSChunks = [];
            _iosPWALastStopTs = 0;
            try { iOSRecorder.start(); } catch (_) {}
        }
    }, 6000);

    _iosPWARunning = true;
    isListening    = true;
    dgMode         = (_iosPWASavedMode === 'conversation' || dgMode === 'conversation') ? 'conversation' : 'wake';
    _iosPWASavedMode = null;
    lastSpeechMs   = Date.now();
    if (dgMode === "conversation") lastSpeechMs = Date.now() + 4000;
    setOrbState("waiting");
    console.log('[iOS PWA] pipeline ready — listening for "apex"');
}

function _iosPWAStopPipeline() {
    console.log('[iOS PWA] stopping pipeline');
    _iosPWARunning  = false;
    isListening     = false;
    clearInterval(_iosPWAVadTimer);     _iosPWAVadTimer     = null;
    if (_iosPWACycleInterval) { clearInterval(_iosPWACycleInterval); _iosPWACycleInterval = null; }
    if (_iosPWAWatchdogInterval) { clearInterval(_iosPWAWatchdogInterval); _iosPWAWatchdogInterval = null; }
    clearTimeout(_iosPWASilenceTimer);  _iosPWASilenceTimer = null;
    if (_iosPWARecorder && _iosPWARecording) {
        _iosPWARecorder.onstop = null; // discard in-flight audio
        try { _iosPWARecorder.stop(); } catch (_) {}
    }
    _iosPWARecorder  = null;
    _iosPWARecording = false;
    _iosPWAChunks    = [];
    if (_iosPWAActiveRecorder) {
        try { _iosPWAActiveRecorder.onstop = null; _iosPWAActiveRecorder.stop(); } catch (_) {}
        _iosPWAActiveRecorder = null;
    }
    if (_iosPWAStream) {
        try { _iosPWAStream.getTracks().forEach(t => t.stop()); } catch (_) {}
        _iosPWAStream = null;
    }
    try { if (_iosPWAAudioCtx) _iosPWAAudioCtx.close(); } catch (_) {}
    _iosPWAAudioCtx = null;
    _iosPWAAnalyser = null;
}

function _iosPWAStartRecording() {
    if (_iosPWARecording || !_iosPWAStream) return;
    _iosPWAChunks = [];
    const mime = MediaRecorder.isTypeSupported("audio/mp4")  ? "audio/mp4"  :
                 MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "";
    try {
        _iosPWARecorder = mime ? new MediaRecorder(_iosPWAStream, { mimeType: mime })
                                : new MediaRecorder(_iosPWAStream);
    } catch (e) { console.warn("[iOS PWA] MediaRecorder init failed:", e.message); console.log("[APEX iOS] ERROR:", e.message); return; }

    _iosPWARecorder.ondataavailable = ev => {
        if (ev.data && ev.data.size > 0) _iosPWAChunks.push(ev.data);
    };
    _iosPWARecorder.onstop = async () => {
        _iosPWARecording = false;
        const mimeType = _iosPWARecorder.mimeType || mime || "audio/webm";
        const blob = new Blob(_iosPWAChunks, { type: mimeType });
        _iosPWAChunks = [];
        if (blob.size < 1000) { console.log("[iOS PWA] blob too small, skipping"); return; }
        console.log(`[iOS] recording stopped — blob size: ${blob.size}B — sending to /transcribe`);
        console.log("[APEX iOS] Sending blob to Deepgram, size:", blob.size);
        await _iosPWATranscribeAndProcess(blob, mimeType);
    };
    try {
        _iosPWARecorder.start(100);
        _iosPWARecording = true;
        console.log("[iOS PWA] recording started");
        console.log("[APEX iOS] MediaRecorder started");
    } catch (e) {
        console.warn("[iOS PWA] MediaRecorder.start failed:", e.message);
        console.log("[APEX iOS] ERROR:", e.message);
        _iosPWARecorder = null;
    }
}

function _iosPWAStopRecording() {
    clearTimeout(_iosPWASilenceTimer); _iosPWASilenceTimer = null;
    if (!_iosPWARecorder || !_iosPWARecording) return;
    try { _iosPWARecorder.stop(); } catch (_) { _iosPWARecording = false; }
    console.log("[iOS PWA] recording stopped — transcribing");
}

function _iosPWAStopRecordingImmediate() {
    if (_iosPWAActiveRecorder && _iosPWAActiveRecorder.state === "recording") {
        _iosPWAActiveRecorder.onstop = null;
        try { _iosPWAActiveRecorder.stop(); } catch (_) {}
        _iosPWAActiveRecorder = null;
    }
    clearTimeout(_iosPWASilenceTimer); _iosPWASilenceTimer = null;
    if (!_iosPWARecorder || !_iosPWARecording) return;
    _iosPWARecorder.onstop = null; // discard — AI is about to speak
    try { _iosPWARecorder.stop(); } catch (_) {}
    _iosPWARecording = false;
    _iosPWAChunks    = [];
    console.log("[iOS PWA] recording discarded (AI busy)");
}

async function _iosPWATranscribeAndProcess(blob, mimeType) {
    if (dgMuted || isSpeakingNow) { console.log("[iOS PWA] transcription skipped — AI busy"); return; }
    try {
        console.log(`[iOS PWA] transcribing ${blob.size}B (${mimeType})`);
        const res = await fetch(buildApiUrl("/api/transcribe"), {
            method:  "POST",
            headers: buildApiHeaders({ "Content-Type": mimeType }),
            body:    blob
        });
        if (!res.ok) { console.warn(`[iOS] transcribe error: ${res.status}`); return; }
        const data       = await res.json();
        const transcript = (data.transcript || "").trim();
        if (!transcript) { console.log("[iOS PWA] empty transcript, ignoring"); return; }
        console.log(`[iOS] transcribe response: "${transcript}"`);
        console.log("[APEX iOS] Transcript received:", transcript);
        _iosPWAHandleTranscript(transcript);
    } catch (e) {
        console.error("[iOS PWA] transcribe error:", e.message);
        console.log("[APEX iOS] ERROR:", e.message);
    }
}

function _iosPWAHandleTranscript(transcript) {
    if (!transcript) return;
    if (isSpeakingNow) {
        console.log('[APEX iOS] transcript received while speaking — interrupting speech:', transcript);
        window.speechSynthesis.cancel();
        isSpeakingNow = false;
        dgMuted = false;
    }
    if (dgMuted) return;
    lastSpeechMs = Date.now();
    if (dgMode === "wake") {
        console.log(`[iOS] wake check: "${transcript}" — matched: ${/\bapex\b/i.test(transcript)}`);
        if (/\bapex\b/i.test(transcript)) {
            console.log("[iOS Wake] wake word matched → conversation");
            console.log("[APEX iOS] Wake word APEX detected");
            dgMode = "conversation";
            lastSpeechMs = Date.now();
            setOrbState("listening");
            speak("Yes?");
            renderChatMessage("system", "Listening…");
        }
    } else {
        console.log(`[iOS Conv] "${transcript}"`);
        if (/\bstand\s*by\b|\bgo\s+to\s+sleep\b|\bstop\s+listening\b/i.test(transcript)) {
            interruptSpeech();
            dgMode = "wake";
            setOrbState("waiting");
            return;
        }
        document.getElementById("chatInput").value = transcript;
        lastSendWasVoice = true;
        dgMuted = true;
        console.log(`[iOS] sending to voice-chat: "${transcript}"`);
        sendVoiceChatCommand(transcript);
    }
}

// ── Web Speech API voice pipeline (desktop only) ──────────────────────
function _rms(buf) {
    let s = 0;
    for (let i = 0; i < buf.length; i++) s += buf[i] * buf[i];
    const rms = Math.sqrt(s / buf.length);
    return rms > 0 ? 20 * Math.log10(rms) : -Infinity;
}

async function startVoicePipeline() {
    if (isIOSPWA) { if (false) { await _iosPWAStartPipeline(); } return; }
    if (srec) return;
    if (!autoListen && !_manualStart) return;
    _manualStart = false;

    // ── 1. Web Speech API (desktop — SR manages its own mic internally) ──
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
        _showBanner("banner-nospeech", "Voice input not supported on this browser — please use Chrome or type below.");
        return;
    }

    srec = new SR();
    srec.continuous = true;
    srec.interimResults = false;
    srec.lang = "en-GB";

    srec.onresult = e => {
        if (!e.results[e.resultIndex].isFinal) return;
        const transcript = e.results[e.resultIndex][0].transcript.trim();
        if (!transcript) return;
        lastSpeechMs = Date.now();

        if (isSpeakingNow) {
            if (!_isTouchDevice) {
                // Desktop: main SR handles interrupt directly — stop audio and send transcript
                const wordCount = transcript.trim().split(/\s+/).filter(w => w.length >= 2).length;
                if (wordCount >= 2) {
                    interruptSpeech();
                    document.getElementById("chatInput").value = transcript;
                    lastSendWasVoice = true;
                    dgMuted = true;
                    sendVoiceChatCommand(transcript);
                }
            }
            return;
        }
        if (dgMuted) return; // block transcripts during thinking phase
        if (dgMode === "wake") {
            console.log(`[Wake] transcript: "${transcript}"`);
            if (/\bapex\b/i.test(transcript)) {
                console.log("[Wake] wake word matched → conversation mode");
                dgMode = "conversation";
                lastSpeechMs = Date.now();
                setOrbState("listening");
                speak("Yes?");
                renderChatMessage("system", "Listening…");
            } else {
                console.log(`[Wake] wake word not matched: "${transcript}"`);
            }
        } else {
            if (Date.now() < _postSpeakLockUntil) {
                console.log('[SR] post-speak echo discarded:', transcript);
                return;
            }
            console.log(`[SR] conversation: "${transcript}"`);
            // Standby voice commands — cancel audio and return to wake mode immediately
            if (/\bstand\s*by\b|\bgo\s+to\s+sleep\b|\bstop\s+listening\b/i.test(transcript)) {
                console.log(`[SR] standby command detected: "${transcript}"`);
                interruptSpeech();
                dgMode = "wake";
                setOrbState("waiting");
                return;
            }
            document.getElementById("chatInput").value = transcript;
            lastSendWasVoice = true;
            dgMuted = true;
            sendVoiceChatCommand(transcript);
        }
    };

    srec.onerror = e => {
        if (e.error === "not-allowed") {
            _showBanner("banner-micdenied", "Microphone access denied.");
        } else if (e.error === "no-speech" || e.error === "audio-capture") {
            if (srec && !isSpeakingNow && isListening && document.visibilityState !== "hidden") {
                setTimeout(() => { try { srec.start(); } catch (_) {} }, 500);
            }
        } else if (e.error !== "no-speech") {
            console.error("[SR] error:", e.error);
        }
    };

    srec.onend = () => {
        console.log("[SR] ended — restarting");
        if (srec && !isSpeakingNow && isListening && document.visibilityState !== "hidden") {
            try { srec.start(); } catch (_) {}
        }
    };

    dgMode = "wake";
    lastSpeechMs = Date.now();
    isListening = true;
    setOrbState("waiting");
    console.log('[Voice] SpeechRecognition starting — mode:wake');
    try { srec.start(); } catch (e) { console.error('[SR] start error:', e.message); }

    // ── 2. AnalyserNode + VAD silence timer — desktop only ──────────────────────────────────
    // iOS PWA returns early above (line 2077) — this block is desktop-only.
    if (!dgAudioCtx) {
        try {
            if (!dgStream) {
                dgStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                console.log('[Voice] mic granted (desktop)');
            }
            dgAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
            dgAnalyser = dgAudioCtx.createAnalyser();
            dgAnalyser.fftSize = 256;
            dgAudioCtx.createMediaStreamSource(dgStream).connect(dgAnalyser);

            const buf = new Float32Array(dgAnalyser.fftSize);
            dgSilenceTimer = setInterval(() => {
                if (!isListening) return;
                dgAnalyser.getFloatTimeDomainData(buf);
                const db = _rms(buf);

                if (isSpeakingNow) {
                    if (!_isTouchDevice) return; // desktop: main SR handles interrupts
                    if (_vadInterruptSR) return; // already capturing
                    if (db > -55) {
                        console.log("[VAD] above -55dB — starting interrupt SR");
                        _vadDebounceStart = null;
                        _startInterruptSR();
                    }
                    return;
                }

                const now = Date.now();
                if (now - dgDbLogTs >= 2000) {
                    dgDbLogTs = now;
                    console.log(`[Voice] dB: ${db === -Infinity ? "-∞" : db.toFixed(1)} | mode: ${dgMode}`);
                }
                if (dgMode === "conversation" && !dgMuted) {
                    if (db > -30) lastSpeechMs = now;
                    else if (now - lastSpeechMs > CONV_SILENCE_MS) {
                        console.log(`[Voice] ${now - lastSpeechMs}ms silence → returning to standby (wake mode)`);
                        dgMode = "wake";
                        setOrbState("waiting");
                    }
                }
            }, 80);
        } catch (e) {
            console.warn("[Voice] analyser init failed:", e.message);
        }
    }
}

function stopVoicePipeline() {
    if (isIOSPWA) { _iosPWAStopPipeline(); return; }
    if (dgSilenceTimer) { clearInterval(dgSilenceTimer); dgSilenceTimer = null; }
    try { if (dgAudioCtx) { dgAudioCtx.close(); dgAudioCtx = null; } } catch (_) {}
    dgAnalyser = null;
    if (_vadInterruptSR) { try { _vadInterruptSR.abort(); } catch (_) {} _vadInterruptSR = null; }
    if (srec) { try { srec.abort(); } catch (_) {} srec = null; }
    isListening = false;
}

// ── Background / foreground mic lifecycle ─────────────────────────────
function _pauseVoiceForBackground() {
    _iosPWASavedMode = dgMode;
    console.log("[Voice] page hidden — releasing mic");
    if (currentAudio) { try { currentAudio.pause(); } catch (_) {} }
    if (isIOSPWA) {
        _iosPWAStopPipeline();
        return;
    }
    // Desktop: null srec first so its onend handler does not restart recognition
    if (srec) {
        const _old = srec;
        srec = null;
        try { _old.stop(); } catch (_) {}
    }
    if (dgStream) {
        try { dgStream.getTracks().forEach(t => t.stop()); } catch (_) {}
        dgStream = null;
    }
    if (dgSilenceTimer) { clearInterval(dgSilenceTimer); dgSilenceTimer = null; }
    try { if (dgAudioCtx) { dgAudioCtx.close(); } } catch (_) {}
    dgAudioCtx = null;
    dgAnalyser = null;
    stopVAD();
    _vadDebounceStart = null;
    if (_vadInterruptSR) { try { _vadInterruptSR.abort(); } catch (_) {} _vadInterruptSR = null; }
}

async function _restoreVoiceFromBackground() {
    console.log("[Voice] page visible — restoring mic");
    if (!autoListen) return;
    if (isIOSPWA) {
        if (!_iosPWARunning) { if (false) { await _iosPWAStartPipeline(); } }
        return;
    }
    if (srec) return;
    await startVoicePipeline();
}

function muteDeepgram() {
    dgMuted = true;
    setOrbState("thinking");
    if (isIOSPWA && _iosPWAActiveRecorder && _iosPWAActiveRecorder.state === 'recording') {
        _iosPWASpeaking = true;
        if (_iosPWACycleInterval) { clearInterval(_iosPWACycleInterval); _iosPWACycleInterval = null; }
        if (_iosPWAWatchdogInterval) { clearInterval(_iosPWAWatchdogInterval); _iosPWAWatchdogInterval = null; }
        if (_iosPWAActiveRecorder) {
            try { _iosPWAActiveRecorder.onstop = null; _iosPWAActiveRecorder.stop(); } catch(_) {}
            _iosPWAActiveRecorder = null;
        }
        console.log('[APEX iOS] muteDeepgram — recorder stopped, releasing audio session for speech');
    }
    if (isIOSPWA && _iosPWAStream) {
        _iosPWAStream.getTracks().forEach(t => t.stop());
        _iosPWAStream = null;
        console.log('[APEX iOS] muteDeepgram — mic tracks stopped, loudspeaker now active');
    }
}

function unmuteDeepgram() {
    stopVAD();
    dgMuted = false;
    lastSpeechMs = _isTouchDevice ? Date.now() : Date.now() + 2000;
    console.log(`[Voice] unmuteDeepgram — mode:${dgMode} isListening:${isListening}`);
    if (isListening) setOrbState(dgMode === "conversation" ? "listening" : "waiting");
    // iOS: VAD timer handles silence tracking — nothing extra needed here
    if (isIOSPWA) {
        _iosPWASpeaking = false;
        _iosPWARunning = false;
        console.log('[APEX iOS] unmuteDeepgram — restarting full pipeline with fresh getUserMedia');
        setTimeout(() => { if (false) { _iosPWAStartPipeline(); } }, 600);
    }
}

function startListening() {
    _manualStart = true;
    startVoicePipeline();
}

function stopListening() {
    isListening = false;
    dgMuted = false;
    stopVoicePipeline();
    try { if (dgStream) { dgStream.getTracks().forEach(t => t.stop()); dgStream = null; } } catch (_) {}
    setOrbState("ready");
}

function toggleListening() {
    if (isSpeakingNow || currentAudio) {
        interruptSpeech();
        return;
    }
    if (isListening || srec) stopListening(); else startListening();
}

function toggleAutoListen() {
    autoListen = !autoListen;
    const btn = document.getElementById("autoListenBtn");
    btn.textContent = `Auto-listen: ${autoListen ? "ON" : "OFF"}`;
    btn.classList.toggle("on", autoListen);
    if (!autoListen) {
        stopListening();
    } else {
        startVoicePipeline();
    }
}

// ══ CHAT ══════════════════════════════════════════════════════════════
function _cleanForDisplay(text) {
    return String(text || "")
        .replace(/\*\*(.+?)\*\*/g, "$1")
        .replace(/\*(.+?)\*/g, "$1")
        .replace(/~~(.+?)~~/g, "$1")
        .replace(/`{1,3}[^`]*`{1,3}/g, "")
        .replace(/#{1,6}\s*/g, "")
        .replace(/[\u{1F300}-\u{1FAFF}]/gu, "")
        .replace(/[\u{2600}-\u{26FF}]/gu, "")
        .replace(/[\u{2700}-\u{27BF}]/gu, "")
        .replace(/\[APPROVAL REQUIRED\]/gi, "")
        .trim();
}

function renderChatMessage(role, message) {
    const log = document.getElementById("chatLog");
    if (!log) return;
    const nearBottom = (log.scrollHeight - log.scrollTop - log.clientHeight) < 120;

    if (role === "ai" && /\[APPROVAL REQUIRED\]/i.test(message)) {
        renderCentreApprovalCard(message);
    }

    const display = role === "ai" ? _cleanForDisplay(message) : String(message || "");

    const bubble = document.createElement("div");
    bubble.className = `chat-bubble ${role}`;
    bubble.textContent = display || message;
    log.appendChild(bubble);

    if (nearBottom || role === "user" || role === "system") {
        log.scrollTop = log.scrollHeight;
    }
}

function renderCentreApprovalCard(message) {
    const existing = document.getElementById("centreApproval");
    if (existing) existing.remove();

    const clean = message.replace(/\[APPROVAL REQUIRED\]/gi, "").trim();
    const card  = document.createElement("div");
    card.id = "centreApproval";
    card.className = "centre-approval";
    card.innerHTML = `
        <div class="capp-label">⚡ Approval Required</div>
        <div class="capp-text">${escapeHtml(shortenText(clean, 200))}</div>
        <div class="capp-actions">
            <button class="capp-btn yes" onclick="sendApprovalDecision('approved')">✓ Approve</button>
            <button class="capp-btn no"  onclick="sendApprovalDecision('rejected')">✕ Reject</button>
        </div>
    `;

    // Insert before chat-log
    const log = document.getElementById("chatLog");
    log.parentNode.insertBefore(card, log);
}

async function sendApprovalDecision(decision) {
    const card = document.getElementById("centreApproval");
    if (card) card.remove();
    await sendChatCommandFromText(decision);
}

async function sendChatCommandFromText(command, options = {}) {
    const { silent = false } = options;
    const wasVoice = lastSendWasVoice;
    lastSendWasVoice = false;

    if (!silent) renderChatMessage("user", command);
    setOrbState("thinking");
    if (!silent) showTypingIndicator();
    const t0 = Date.now();

    try {
        const data = await fetchJson("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: command })
        });

        hideTypingIndicator();
        const reply = data.reply || "No reply.";
        if (!silent) {
            renderChatMessage("ai", reply);
            const ms = Date.now() - t0;
            const log = document.getElementById("chatLog");
            if (log) {
                const lat = document.createElement("div");
                lat.className = "apex-latency";
                lat.textContent = `${ms}ms`;
                log.appendChild(lat);
            }
            setOrbState("speaking");
            speak(reply, { useFiller: wasVoice });
        } else {
            setOrbState("ready");
        }

        setConnStatus(true);
        _smartRefresh(command);
        return data;
    } catch (error) {
        hideTypingIndicator();
        const msg = error.message || "Server error.";
        if (!silent) {
            renderChatMessage("system", msg);
            try { speak(msg); } catch (_) {}
        }
        setOrbState("ready");
        setConnStatus(false);
        throw error;
    }
}

async function sendVoiceChatCommand(msg) {
    if (!msg || !msg.trim()) return;
    document.getElementById("chatInput").value = "";
    console.log(`[Chat] appending user: "${msg}"`);
    renderChatMessage("user", msg);
    setOrbState("thinking");
    showTypingIndicator();
    _t0Voice = Date.now();
    console.log("[LATENCY] +0ms request sent to server");

    try {
        const data = await fetchJson("/api/voice-chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg })
        });

        console.log(`[LATENCY] +${Date.now() - _t0Voice}ms reply received from server`);
        console.log("[Voice] server reply:", data);
        hideTypingIndicator();
        const reply = data.reply || "Done.";
        console.log(`[Chat] appending AI: "${reply}"`);
        renderChatMessage("ai", reply);
        const ms = Date.now() - _t0Voice;
        const log = document.getElementById("chatLog");
        if (log) {
            const lat = document.createElement("div");
            lat.className = "apex-latency";
            lat.textContent = `${ms}ms`;
            log.appendChild(lat);
            log.scrollTop = log.scrollHeight;
        }
        setOrbState("speaking");
        console.log("[Voice] passing to ElevenLabs / speak queue");
        speak(reply, { useFiller: true });

        setConnStatus(true);
        _smartRefresh(msg);
    } catch (error) {
        hideTypingIndicator();
        console.error("[Voice] request failed:", error);
        const errMsg = "Something went wrong — please try again.";
        renderChatMessage("system", `⚠ ${errMsg}`);
        try { speak(errMsg); } catch (_) {}
        unmuteDeepgram();
        setOrbState(autoListen ? "waiting" : "ready");
        setConnStatus(false);
    }
}

    const input = document.getElementById("chatInput");
    const msg   = input.value.trim();
    if (!msg) return;
    input.value = "";
    await sendChatCommandFromText(msg);
}

async function refreshEmailPanel() {
    const el = document.getElementById("emailList");
    if (!el) return;
    try {
        const data   = await fetchJson("/api/emails");
        const emails = (data.emails || []).slice(0, 5);
        cachedEmailCount = emails.length;
        updateStatusBar();
        // Cache full email objects so the draft modal can read suggested_reply
        _emailCache = {};
        emails.forEach(e => { _emailCache[e.id] = e; });
        if (!emails.length) {
            el.innerHTML = '<div class="empty-note">Say "check my emails" to fetch them.</div>';
            return;
        }
        el.innerHTML = emails.map(e => {
            const hasReply   = !!e.suggested_reply;
            const statusSent = e.status === "sent" || e.status === "rejected";
            const isUrgent   = (e.priority || "").toLowerCase() === "urgent";
            const draftBtns = hasReply && !statusSent
                ? `<div class="email-actions">
                    <div style="font-size:10px;color:#ff9f43;font-weight:700;margin-bottom:5px">DRAFT — not sent</div>
                    <button class="email-btn approve" onclick="previewEmailDraft(${e.id})">Review &amp; Send</button>
                    <button class="email-btn reject"  onclick="rejectEmail(${e.id})">Discard</button>
                   </div>`
                : `<div style="font-size:10px;color:var(--muted);margin-top:5px">${escapeHtml(e.status || "")}</div>`;
            const actionBtns = draftBtns + `<div class="email-reply-row"><button class="email-btn reply" onclick="openReplyDraft(${e.id})">Reply</button></div>`;
            return `
                <div class="email-item" id="email-${e.id}"${isUrgent ? ' style="border-left:2px solid #ff4d6d"' : ''}>
                    <div class="email-meta">
                        <span class="email-priority ${escapeHtml(e.priority)}">${escapeHtml(e.priority)}</span>
                        <span class="email-sender">${escapeHtml(e.sender || "Unknown")}</span>
                    </div>
                    <div class="email-subject">${escapeHtml(shortenText(e.subject || "No subject", 50))}</div>
                    <div class="email-summary">${escapeHtml(shortenText(e.summary || "", 80))}</div>
                    ${actionBtns}
                </div>`;
        }).join("");
    } catch (err) {
        el.innerHTML = `<div class="empty-note">${escapeHtml(err.message)}</div>`;
    }
}

function previewEmailDraft(id) {
    const email = _emailCache[id];
    if (!email || !email.suggested_reply) { renderChatMessage("system", "Draft not available."); return; }
    const subject = (email.subject || "").startsWith("Re:") ? email.subject : `Re: ${email.subject || ""}`;
    document.getElementById("draftTo").textContent  = email.sender || "";
    document.getElementById("draftSubject").textContent = subject;
    document.getElementById("draftBody").value      = email.suggested_reply;
    document.getElementById("draftSendBtn").onclick = () => confirmSendEmail(id);
    document.getElementById("emailDraftModal").classList.add("active");
    document.getElementById("draftBody").focus();
}

async function openReplyDraft(id) {
    const email = _emailCache[id];
    if (!email) { renderChatMessage("system", "Email not found."); return; }
    _currentDraftEmailId = id;
    const subject = (email.subject || "").startsWith("Re:") ? email.subject : `Re: ${email.subject || ""}`;
    document.getElementById("draftTo").textContent      = email.sender || "";
    document.getElementById("draftSubject").textContent = subject;
    document.getElementById("draftBody").value          = "Drafting reply…";
    document.getElementById("draftBody").disabled       = true;
    document.getElementById("draftPrompt").value        = "";
    document.getElementById("draftSendBtn").onclick     = () => confirmUserComposedReply(_currentDraftEmailId);
    document.getElementById("emailDraftModal").classList.add("active");
    await _fetchAiDraft(id, "");
    document.getElementById("draftBody").disabled = false;
    document.getElementById("draftBody").focus();
}

async function _fetchAiDraft(id, userPrompt) {
    const email = _emailCache[id];
    if (!email) return;
    try {
        const res = await fetch("/api/ai-draft-reply", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                emailSubject: email.subject  || "",
                emailBody:    email.summary  || email.subject || "",
                senderName:   email.sender   || "",
                userPrompt:   userPrompt     || ""
            })
        });
        const data = await res.json();
        if (data.ok && data.draft) document.getElementById("draftBody").value = data.draft;
    } catch { /* leave current value */ }
}

async function regenerateAiDraft() {
    const id = _currentDraftEmailId;
    if (!id) return;
    const userPrompt = document.getElementById("draftPrompt").value.trim();
    document.getElementById("draftBody").value    = "Drafting reply…";
    document.getElementById("draftBody").disabled = true;
    await _fetchAiDraft(id, userPrompt);
    document.getElementById("draftBody").disabled = false;
}

async function confirmUserComposedReply(id) {
    const body = document.getElementById("draftBody").value.trim();
    if (!body) { alert("Please write a reply before sending."); return; }
    if (!confirm("Are you sure you want to send this reply?\n\nThis cannot be undone.")) return;
    const email   = _emailCache[id];
    if (!email) { renderChatMessage("system", "Email not found."); return; }
    const subject = document.getElementById("draftSubject").textContent;
    const to      = document.getElementById("draftTo").textContent;
    closeEmailDraftModal();
    try {
        const res = await fetch("/api/send-reply", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-User-Confirmed": "true" },
            body: JSON.stringify({ to, subject, body, gmailId: email.gmail_id || "" })
        });
        const data = await res.json();
        renderChatMessage("system", data.ok ? `Reply sent to ${to}.` : `Send failed: ${data.reply}`);
    } catch (err) {
        renderChatMessage("system", `Send error: ${err.message}`);
    }
}

function closeEmailDraftModal() {
    document.getElementById("emailDraftModal").classList.remove("active");
}

async function refreshFinancePanel() {
    const el = document.getElementById("financePanel");
    if (!el) return;
    try {
        const data    = await fetchJson("/api/finance/summary");
        const summary = data.summary || [];
        const budgets = data.budgets || [];

        if (!summary.length) {
            el.innerHTML = '<div class="empty-note">No transactions yet.</div>';
            return;
        }

        const budgetMap = {};
        for (const b of budgets) budgetMap[b.category] = parseFloat(b.monthly_limit);

        let totalIncome  = 0;
        let totalExpense = 0;
        const catSpend   = {};

        for (const row of summary) {
            const amt = parseFloat(row.total);
            if (row.type === "income")  totalIncome  += amt;
            if (row.type === "expense") { totalExpense += amt; catSpend[row.category] = (catSpend[row.category] || 0) + amt; }
        }

        const topCats = Object.entries(catSpend).sort((a,b) => b[1]-a[1]).slice(0,3);

        const totalHtml = `
            <div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:8px">
                <span style="color:#4ade80">In: £${totalIncome.toFixed(0)}</span>
                <span style="color:#ff4d6d">Out: £${totalExpense.toFixed(0)}</span>
            </div>`;

        const catHtml = topCats.map(([cat, spent]) => {
            const limit = budgetMap[cat];
            const pct   = limit ? Math.min((spent / limit) * 100, 100) : 0;
            const over  = limit && spent > limit;
            const limitStr = limit ? `£${limit}` : "—";
            return `<div class="finance-cat-row">
                <div class="finance-cat-label"><span>${cat}</span><span>£${spent.toFixed(0)} / ${limitStr}</span></div>
                ${limit ? `<div class="finance-bar-bg"><div class="finance-bar-fill${over ? " over" : ""}" style="width:${pct}%"></div></div>` : ""}
            </div>`;
        }).join("");

        el.innerHTML = totalHtml + `<div class="finance-bar-row">${catHtml}</div>`;
    } catch (err) {
        el.innerHTML = `<div class="empty-note">${escapeHtml(err.message)}</div>`;
    }
}

async function logExpenseQuick() {
    const desc = prompt("Description:");
    if (!desc) return;
    const amt = prompt("Amount (£):");
    if (!amt || isNaN(parseFloat(amt))) return;
    const type = confirm("Is this income? (Cancel = expense)") ? "income" : "expense";
    try {
        const data = await fetchJson("/api/finance/transaction", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ description: desc, amount: parseFloat(amt), type })
        });
        renderChatMessage("system", data.reply || "Saved.");
        await refreshFinancePanel();
    } catch (err) {
        renderChatMessage("system", err.message);
    }
}

// ══ ROUTINES PANEL ════════════════════════════════════════════════════
async function refreshRoutinesPanel() {
    const el = document.getElementById("routinesPanel");
    if (!el) return;
    try {
        const data     = await fetchJson("/api/routines");
        const routines = data.routines || [];
        cachedActiveRoutines = routines.filter(r => r.active).length;
        updateStatusBar();
        if (!routines.length) {
            el.innerHTML = '<div class="empty-note">Say "add a routine" to create one.</div>';
            return;
        }
        el.innerHTML = routines.map(r => `
            <div class="routine-item">
                <div>
                    <div class="routine-name">${escapeHtml(r.name)}</div>
                    <div class="routine-cron">${escapeHtml(r.schedule_cron)}</div>
                </div>
                <button class="routine-toggle${r.active ? " on" : ""}" onclick="toggleRoutine(${r.id}, ${!r.active})" title="${r.active ? "Disable" : "Enable"}"></button>
            </div>`).join("");
    } catch (err) {
        el.innerHTML = `<div class="empty-note">${escapeHtml(err.message)}</div>`;
    }
}

async function toggleRoutine(id, active) {
    try {
        await fetchJson(`/api/routines/${id}`, {
            method: "PATCH",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ active })
        });
        await refreshRoutinesPanel();
    } catch (err) {
        renderChatMessage("system", err.message);
    }
}

async function addRoutineQuick() {
    const name = prompt("Routine name:");
    if (!name) return;
    const cron = prompt("Cron schedule (e.g. 0 8 * * * for 8am daily):");
    if (!cron) return;
    const desc = prompt("Description (optional):") || "";
    try {
        await fetchJson("/api/routines", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ name, description: desc, schedule_cron: cron })
        });
        await refreshRoutinesPanel();
    } catch (err) {
        renderChatMessage("system", err.message);
    }
}

async function refreshFast() {
    await Promise.all([refreshMemory(), loadNotifications(), loadTasks()]);
}

async function refreshSlow() {
    await Promise.all([refreshEmailPanel(), refreshFinancePanel(), refreshRoutinesPanel()]);
}

async function refreshAll() {
    await Promise.all([refreshFast(), refreshSlow()]);
}

function _smartRefresh(msg) {
    const t = (msg || "").toLowerCase();
    const isEmail    = /email|inbox|mail/.test(t);
    const isFinance  = /spend|budget|transact|expense|income|finance/.test(t);
    const isRoutine  = /routine|schedule|cron/.test(t);
    const isMemory   = /remember|save|note|forget/.test(t);

    const fast = [refreshMemory(), loadNotifications(), loadTasks()];
    const slow = [];
    if (isEmail)   slow.push(refreshEmailPanel());
    if (isFinance) slow.push(refreshFinancePanel());
    if (isRoutine) slow.push(refreshRoutinesPanel());
    if (!slow.length) slow.push(refreshEmailPanel(), refreshFinancePanel(), refreshRoutinesPanel());
    Promise.all([...fast, ...slow]);
}

function updateStatusBar() {
    const bar = document.getElementById("chatStatusBar");
    if (!bar) return;
    const conn  = document.getElementById("connDot");
    const online = conn && conn.classList.contains("on");
    const parts = ["Apex"];
    if (!online) parts.push("· Offline");
    if (cachedEmailCount > 0) parts.push(`· ${cachedEmailCount} email${cachedEmailCount !== 1 ? "s" : ""}`);
    if (cachedActiveRoutines > 0) parts.push(`· ${cachedActiveRoutines} routine${cachedActiveRoutines !== 1 ? "s" : ""} active`);
    bar.textContent = parts.join(" ");
}

function clearChat() {
    const log = document.getElementById("chatLog");
    if (!log) return;
    const keep = log.querySelector("#typingIndicator");
    log.innerHTML = "";
    if (keep) log.appendChild(keep);
    log.innerHTML += '<div class="empty-note" style="text-align:center;padding:20px 0">Chat cleared. Say something or type below.</div>';
}

// ══ KEYBOARD ══════════════════════════════════════════════════════════
document.getElementById("chatInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChatCommand(); }
});

document.addEventListener("keydown", e => {
    if ((e.metaKey || e.ctrlKey) && e.key === "k") {
        e.preventDefault();
        openCommandPalette();
        return;
    }
    if (e.key === "Escape") {
        if (document.getElementById("cmdPalette").classList.contains("open")) {
            closeCommandPalette();
            return;
        }
        if (isListening) stopListening();
        if (window.speechSynthesis) window.speechSynthesis.cancel();
        if (currentAudio) { try { currentAudio.pause(); } catch (_) {} currentAudio = null; }
        speakQueue.length = 0;
        isSpeakingNow = false;
        setOrbState(autoListen ? "waiting" : "ready");
    }
});

// ══ COMMAND PALETTE ══════════════════════════════════════════════════
const CMD_LIST = [
    { icon: "💬", label: "New chat", hint: "Clear and focus", action: () => { clearChat(); document.getElementById("chatInput").focus(); } },
    { icon: "🎙️", label: "Toggle voice listening", hint: "Start / stop mic", action: toggleListening },
    { icon: "🔄", label: "Refresh all panels", hint: "Pull latest data", action: refreshAll },
    { icon: "📧", label: "Check emails now", hint: "Gmail inbox scan", action: () => sendChatCommand("check my emails") },
    { icon: "📝", label: "Save a note", hint: "Type content first", action: () => { closeCommandPalette(); document.getElementById("chatInput").focus(); document.getElementById("chatInput").value = "save note: "; } },
    { icon: "📋", label: "List documents", hint: "Show saved docs", action: () => sendChatCommand("list my documents") },
    { icon: "💰", label: "Finance summary", hint: "This month's spending", action: () => sendChatCommand("finance summary") },
    { icon: "🔍", label: "Search documents", hint: "Semantic search", action: () => { closeCommandPalette(); document.getElementById("chatInput").focus(); document.getElementById("chatInput").value = "search for: "; } },
    { icon: "⚡", label: "Auto-listen toggle", hint: "Turn auto-listen on/off", action: toggleAutoListen },
    { icon: "🗑️", label: "Clear chat history", hint: "Wipe chat log", action: clearChat },
];

let _cmdActive = 0;

function openCommandPalette() {
    document.getElementById("cmdPalette").classList.add("open");
    const inp = document.getElementById("cmdInput");
    inp.value = "";
    _cmdActive = 0;
    renderCmdList("");
    setTimeout(() => inp.focus(), 50);
}

function closeCommandPalette() {
    document.getElementById("cmdPalette").classList.remove("open");
}

function renderCmdList(query) {
    const q = (query || "").toLowerCase();
    const filtered = CMD_LIST.filter(c => !q || c.label.toLowerCase().includes(q) || (c.hint || "").toLowerCase().includes(q));
    _cmdActive = 0;
    const el = document.getElementById("cmdList");
    el.innerHTML = filtered.map((c, i) =>
        `<div class="cmd-item${i === 0 ? " active" : ""}" data-idx="${i}" onclick="executeCmdItem(${CMD_LIST.indexOf(c)})">
            <span class="cmd-icon">${c.icon}</span>
            <span class="cmd-label">${c.label}</span>
            <span class="cmd-hint">${c.hint || ""}</span>
        </div>`
    ).join("");
}

function executeCmdItem(idx) {
    closeCommandPalette();
    const cmd = CMD_LIST[idx];
    if (cmd) cmd.action();
}

function cmdKeyNav(e) {
    const items = document.querySelectorAll("#cmdList .cmd-item");
    if (!items.length) return;
    if (e.key === "ArrowDown") {
        e.preventDefault();
        items[_cmdActive]?.classList.remove("active");
        _cmdActive = (_cmdActive + 1) % items.length;
        items[_cmdActive]?.classList.add("active");
        items[_cmdActive]?.scrollIntoView({ block: "nearest" });
    } else if (e.key === "ArrowUp") {
        e.preventDefault();
        items[_cmdActive]?.classList.remove("active");
        _cmdActive = (_cmdActive - 1 + items.length) % items.length;
        items[_cmdActive]?.classList.add("active");
        items[_cmdActive]?.scrollIntoView({ block: "nearest" });
    } else if (e.key === "Enter") {
        e.preventDefault();
        const active = items[_cmdActive];
        if (active) active.click();
    } else if (e.key === "Escape") {
        closeCommandPalette();
    }
}

// ══ DRAG AND DROP ════════════════════════════════════════════════════
let _dragCount = 0;

document.addEventListener("dragenter", e => {
    e.preventDefault();
    _dragCount++;
    document.getElementById("dropOverlay").classList.add("active");
});

document.addEventListener("dragleave", () => {
    _dragCount--;
    if (_dragCount <= 0) { _dragCount = 0; document.getElementById("dropOverlay").classList.remove("active"); }
});

document.addEventListener("dragover", e => e.preventDefault());

document.addEventListener("drop", async e => {
    e.preventDefault();
    _dragCount = 0;
    document.getElementById("dropOverlay").classList.remove("active");

    const file = e.dataTransfer?.files?.[0];
    if (!file) return;

    renderChatMessage("system", `Uploading "${file.name}"…`);

    const reader = new FileReader();
    reader.onload = async ev => {
        try {
            const base64 = ev.target.result.split(",")[1] || ev.target.result;
            const res = await fetch(buildApiUrl("/api/upload-file"), {
                method: "POST",
                headers: { ...buildApiHeaders(), "Content-Type": "application/json" },
                body: JSON.stringify({ filename: file.name, data: base64, mimeType: file.type })
            });
            const data = await res.json();
            renderChatMessage("ai", data.reply || "File uploaded.");
            if (data.summary) renderChatMessage("ai", `Summary: ${data.summary}`);
        } catch (err) {
            renderChatMessage("system", `Upload failed: ${err.message}`);
        }
    };
    reader.readAsDataURL(file);
});

// ══ SUPABASE REALTIME ════════════════════════════════════════════════
async function initSupabaseRealtime() {
    try {
        const cfgRes = await fetch(buildApiUrl("/api/config"), { headers: buildApiHeaders() });
        if (!cfgRes.ok) return;
        const { supabaseUrl, supabaseAnonKey } = await cfgRes.json();
        if (!supabaseUrl || !supabaseAnonKey) return;

        const sb = window.supabase.createClient(supabaseUrl, supabaseAnonKey);

        sb.channel("realtime-notifications")
            .on("postgres_changes", { event: "INSERT", schema: "public", table: "notifications" }, payload => {
                const n = payload.new;
                if (n) {
                    cachedNotifications.unshift({ id: n.id, title: n.title, body: n.body, created_at: n.created_at, read: false });
                    if (cachedNotifications.length > 50) cachedNotifications.pop();
                    renderNotifications(cachedNotifications);
                }
            })
            .subscribe();

        sb.channel("realtime-email")
            .on("postgres_changes", { event: "INSERT", schema: "public", table: "email_queue" }, () => {
                refreshEmailPanel();
            })
            .subscribe();

        console.log("Supabase Realtime connected.");
    } catch (err) {
        console.warn("Supabase Realtime unavailable:", err.message);
    }
}

setOrbState("waiting");
updateStatusBar();
refreshFast();
refreshSlow();
setInterval(refreshFast, REFRESH_INTERVAL_MS);
setInterval(refreshSlow, SLOW_REFRESH_MS);
fetch(API_BASE + "/api/ping")
    .then(r => setConnStatus(r.ok))
    .catch(() => setConnStatus(false));
// Desktop: start voice pipeline automatically. Touch devices need a gesture first.
setTimeout(() => { if (!isIOSPWA && !_isTouchDevice) { _manualStart = true; startVoicePipeline(); } }, 1000);

// iOS / touch: show tap-to-begin overlay on first visit; skip on return if already granted
if (_isTouchDevice) {
    if (localStorage.getItem('apex_mic_granted')) {
        setTimeout(() => { _manualStart = true; startVoicePipeline(); }, 1000);
    } else {
        const _tapOverlay = document.createElement('div');
        _tapOverlay.id = 'tapBeginOverlay';
        _tapOverlay.style.cssText = 'position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;cursor:pointer;';
        _tapOverlay.innerHTML = '<div style="color:#00d4ff;font-size:1.4rem;font-weight:600;letter-spacing:0.05em;">Tap to Begin</div><div style="color:#666;font-size:0.85rem;margin-top:0.75rem;">Apex AI</div>';
        document.body.appendChild(_tapOverlay);
        _tapOverlay.addEventListener('click', () => {
            localStorage.setItem('apex_mic_granted', '1');
            _tapOverlay.remove();
            _manualStart = true;
            startVoicePipeline();
        }, { once: true });
    }
}

// Release mic when the page is hidden (tab switch, app background, lock screen)
document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "hidden") {
        if (_isTouchDevice) interruptSpeech();
        _pauseVoiceForBackground();
    } else {
        _restoreVoiceFromBackground();
    }
});

// pagehide fires on iOS when the user swipes away — release mic tracks immediately
window.addEventListener("pagehide", () => {
    if (isIOSPWA) {
        _iosPWAStopPipeline();
        return;
    }
    if (dgStream) {
        try { dgStream.getTracks().forEach(t => t.stop()); } catch (_) {}
        dgStream = null;
    }
    if (srec) { try { srec.abort(); } catch (_) {} srec = null; }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').then(reg => {
    reg.update();
    if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      console.log('[SW] Controller changed — new version active');
    });
  });
}
initSupabaseRealtime();

// iOS hold-to-talk button wiring
(function() {
    // Show HTT button on no device — orb is the trigger now
    const floatingBtn = document.getElementById('httBtn');
    if (floatingBtn) floatingBtn.style.display = 'none';

    // Only wire on touch devices
    if (!('ontouchstart' in window)) return;

    // Find the orb — try common selectors
    const orb = document.getElementById('apexOrb') ||
                 document.querySelector('.orb-container') ||
                 document.querySelector('.apex-orb') ||
                 document.querySelector('.orb') ||
                 document.querySelector('[class*="orb"]') ||
                 document.querySelector('.main-circle') ||
                 document.querySelector('.center-circle');

    if (!orb) {
        console.warn('[HTT] orb element not found — cannot wire hold-to-talk');
        return;
    }

    // Make orb touchable
    orb.style.cursor = 'pointer';
    orb.style.userSelect = 'none';
    orb.style.webkitUserSelect = 'none';
    orb.style.touchAction = 'none';

    orb.addEventListener('touchstart', function(e) {
        e.preventDefault();
        _httBegin();
    }, { passive: false });

    orb.addEventListener('touchend', function(e) {
        e.preventDefault();
        _httEnd();
    }, { passive: false });

    orb.addEventListener('touchcancel', function(e) {
        e.preventDefault();
        _httEnd();
    }, { passive: false });

    const hint = document.getElementById('orbHint');
    if (hint) hint.style.display = 'block';

    console.log('[HTT] orb wired as hold-to-talk trigger:', orb.tagName, orb.className || orb.id);
})();
