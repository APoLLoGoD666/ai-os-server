<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Chat</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 16px;
        }

        #chat {
            background: #1e1e1e;
            border-radius: 12px;
            padding: 15px;
            height: 420px;
            overflow-y: auto;
            margin-bottom: 12px;
            border: 1px solid #2f2f2f;
        }

        .message {
            margin-bottom: 12px;
            padding: 10px 12px;
            border-radius: 10px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .user {
            background: #2b6fff;
        }

        .ai {
            background: #2a2a2a;
        }

        .system {
            background: #181818;
            color: #bdbdbd;
            font-style: italic;
        }

        .label {
            font-weight: bold;
            display: block;
            margin-bottom: 4px;
        }

        .row {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #2b6fff;
            color: white;
            cursor: pointer;
            font-size: 16px;
            min-width: 100px;
        }

        button:hover {
            opacity: 0.92;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            margin-bottom: 10px;
            font-size: 14px;
            color: #bdbdbd;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>AI Chat (Render Connected)</h2>

        <div class="status" id="status">Connected to Render</div>

        <div id="chat">
            <div class="message system">
                <span class="label">System</span>
                Ready...
            </div>
        </div>

        <div class="row">
            <input id="input" type="text" placeholder="Type here..." />
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://ai-os-server-jx20.onrender.com";

        const chatBox = document.getElementById("chat");
        const input = document.getElementById("input");
        const sendBtn = document.getElementById("sendBtn");
        const statusText = document.getElementById("status");

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        function addMessage(role, text) {
            const msg = document.createElement("div");
            msg.className = `message ${role}`;

            let label = "System";
            if (role === "user") label = "You";
            if (role === "ai") label = "AI";

            msg.innerHTML = `
                <span class="label">${label}</span>
                ${escapeHtml(text)}
            `;

            chatBox.appendChild(msg);
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        async function sendMessage() {
            const message = input.value.trim();
            if (!message) return;

            addMessage("user", message);
            input.value = "";
            input.focus();

            sendBtn.disabled = true;
            sendBtn.textContent = "Sending...";
            statusText.textContent = "Thinking...";

            try {
                const res = await fetch(`${API_BASE}/chat`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ message })
                });

                const data = await res.json();

                if (!res.ok) {
                    addMessage("ai", data.reply || "Server error.");
                } else {
                    addMessage("ai", data.reply || "No reply.");
                }

            } catch (error) {
                console.error("Connection error:", error);
                addMessage("ai", "Cannot connect to Render server.");
            }

            sendBtn.disabled = false;
            sendBtn.textContent = "Send";
            statusText.textContent = "Connected";
        }

        input.addEventListener("keydown", function (e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });
    </script>
</body>
</html>
