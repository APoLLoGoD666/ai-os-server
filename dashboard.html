<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Workspace</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        .app {
            display: grid;
            grid-template-columns: 300px 1fr;
            min-height: 100vh;
        }

        .sidebar {
            background: #161616;
            border-right: 1px solid #2b2b2b;
            padding: 20px;
            overflow-y: auto;
        }

        .main {
            padding: 20px;
            overflow-y: auto;
        }

        .panel {
            background: #1b1b1b;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 16px;
        }

        .panel h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .small {
            font-size: 13px;
            color: #bdbdbd;
        }

        .button-row,
        .quick-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .button-row button,
        .quick-grid button,
        .widget-button {
            border: none;
            border-radius: 8px;
            background: #2b6fff;
            color: white;
            padding: 10px 12px;
            cursor: pointer;
            font-size: 14px;
        }

        .button-row button.secondary,
        .quick-grid button.secondary {
            background: #2f2f2f;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .topbar h1 {
            margin: 0;
            font-size: 28px;
        }

        .status {
            color: #bdbdbd;
            font-size: 14px;
        }

        #customLayout {
            min-height: 70vh;
            background: #121212;
            border: 1px dashed #333;
            border-radius: 12px;
            padding: 12px;
        }

        #customLayout.empty-layout {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8e8e8e;
        }

        .list {
            margin: 0;
            padding-left: 18px;
        }

        .list li {
            margin-bottom: 6px;
        }

        .doc-item {
            padding: 8px 0;
            border-bottom: 1px solid #292929;
        }

        .doc-item:last-child {
            border-bottom: none;
        }

        .doc-name {
            font-weight: bold;
        }

        .doc-meta {
            font-size: 13px;
            color: #bdbdbd;
            margin-top: 2px;
        }

        .widget-chat-box {
            background: #121212;
            border: 1px solid #2d2d2d;
            border-radius: 12px;
            padding: 12px;
            min-height: 180px;
            max-height: 280px;
            overflow-y: auto;
            margin-bottom: 10px;
        }

        .widget-chat-input-row {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .widget-chat-input-row input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            outline: none;
        }

        .empty {
            color: #9b9b9b;
            font-size: 14px;
        }

        @media (max-width: 900px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                border-right: none;
                border-bottom: 1px solid #2b2b2b;
            }
        }
    </style>
</head>
<body>
    <div class="app">
        <aside class="sidebar">
            <h2>AI Workspace</h2>
            <div class="small">Connected</div>

            <div class="panel">
                <h3>Quick Actions</h3>
                <div class="quick-grid">
                    <button onclick="loadCustomLayout()">Refresh Layout</button>
                    <button onclick="window.open('/editor', '_blank')">Open Editor</button>
                    <button class="secondary" onclick="loadSidebarData()">Refresh Data</button>
                </div>
            </div>

            <div class="panel">
                <h3>Files</h3>
                <div id="filesPanel" class="small">Loading...</div>
            </div>

            <div class="panel">
                <h3>Documents</h3>
                <div id="documentsPanel" class="small">Loading...</div>
            </div>

            <div class="panel">
                <h3>Memory</h3>
                <div id="memoryPanel" class="small">Loading...</div>
            </div>
        </aside>

        <main class="main">
            <div class="topbar">
                <h1>Dashboard</h1>
                <div class="status" id="status">Ready</div>
            </div>

            <div id="customLayout" class="empty-layout">No custom layout saved yet.</div>
        </main>
    </div>

    <script>
        const API_BASE = "";

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadFilesSidebar() {
            const panel = document.getElementById("filesPanel");
            panel.innerHTML = "Loading...";

            try {
                const res = await fetch(`${API_BASE}/files`);
                const data = await res.json();

                if (!data.ok || !Array.isArray(data.files) || data.files.length === 0) {
                    panel.innerHTML = `<div class="empty">No files found.</div>`;
                    return;
                }

                panel.innerHTML = `<ul class="list">${data.files.map(f => `<li>${escapeHtml(f)}</li>`).join("")}</ul>`;
            } catch (error) {
                panel.innerHTML = `<div class="empty">Could not load files.</div>`;
            }
        }

        async function loadDocumentsSidebar() {
            const panel = document.getElementById("documentsPanel");
            panel.innerHTML = "Loading...";

            try {
                const res = await fetch(`${API_BASE}/documents`);
                const data = await res.json();

                if (!data.ok || !Array.isArray(data.documents) || data.documents.length === 0) {
                    panel.innerHTML = `<div class="empty">No documents found.</div>`;
                    return;
                }

                panel.innerHTML = data.documents.map(doc => `
                    <div class="doc-item">
                        <div class="doc-name">${escapeHtml(doc.filename)}</div>
                        <div class="doc-meta">${escapeHtml(doc.classification || "unknown")}</div>
                    </div>
                `).join("");
            } catch (error) {
                panel.innerHTML = `<div class="empty">Could not load documents.</div>`;
            }
        }

        async function loadMemorySidebar() {
            const panel = document.getElementById("memoryPanel");
            panel.innerHTML = "Loading...";

            try {
                const res = await fetch(`${API_BASE}/memory`);
                const data = await res.json();

                if (!data.ok || !Array.isArray(data.memory) || data.memory.length === 0) {
                    panel.innerHTML = `<div class="empty">No memory found.</div>`;
                    return;
                }

                const recent = data.memory.slice(-6).reverse();

                panel.innerHTML = recent.map(item => `
                    <div class="doc-item">
                        <div class="doc-name">${escapeHtml(item.role)}</div>
                        <div class="doc-meta">${escapeHtml(item.message || "")}</div>
                    </div>
                `).join("");
            } catch (error) {
                panel.innerHTML = `<div class="empty">Could not load memory.</div>`;
            }
        }

        async function loadSidebarData() {
            await Promise.all([
                loadFilesSidebar(),
                loadDocumentsSidebar(),
                loadMemorySidebar()
            ]);
        }

        async function fetchFilesData() {
            const res = await fetch(`${API_BASE}/files`);
            return res.json();
        }

        async function fetchDocumentsData() {
            const res = await fetch(`${API_BASE}/documents`);
            return res.json();
        }

        async function fetchMemoryData() {
            const res = await fetch(`${API_BASE}/memory`);
            return res.json();
        }

        async function populateFilesWidgets(root) {
            const widgets = root.querySelectorAll('[data-widget="files"]');
            if (!widgets.length) return;

            try {
                const data = await fetchFilesData();
                const items = Array.isArray(data.files) ? data.files : [];

                widgets.forEach(widget => {
                    widget.innerHTML = `
                        <h3 style="margin-top:0;">Files</h3>
                        ${items.length
                            ? `<ul class="list">${items.map(f => `<li>${escapeHtml(f)}</li>`).join("")}</ul>`
                            : `<div class="empty">No files found.</div>`}
                    `;
                });
            } catch {
                widgets.forEach(widget => {
                    widget.innerHTML = `<h3 style="margin-top:0;">Files</h3><div class="empty">Could not load files.</div>`;
                });
            }
        }

        async function populateDocumentsWidgets(root) {
            const widgets = root.querySelectorAll('[data-widget="documents"]');
            if (!widgets.length) return;

            try {
                const data = await fetchDocumentsData();
                const docs = Array.isArray(data.documents) ? data.documents : [];

                widgets.forEach(widget => {
                    widget.innerHTML = `
                        <h3 style="margin-top:0;">Documents</h3>
                        ${docs.length
                            ? docs.map(doc => `
                                <div class="doc-item">
                                    <div class="doc-name">${escapeHtml(doc.filename)}</div>
                                    <div class="doc-meta">${escapeHtml(doc.classification || "unknown")}</div>
                                </div>
                            `).join("")
                            : `<div class="empty">No documents found.</div>`}
                    `;
                });
            } catch {
                widgets.forEach(widget => {
                    widget.innerHTML = `<h3 style="margin-top:0;">Documents</h3><div class="empty">Could not load documents.</div>`;
                });
            }
        }

        async function populateMemoryWidgets(root) {
            const widgets = root.querySelectorAll('[data-widget="memory"]');
            if (!widgets.length) return;

            try {
                const data = await fetchMemoryData();
                const mem = Array.isArray(data.memory) ? data.memory.slice(-6).reverse() : [];

                widgets.forEach(widget => {
                    widget.innerHTML = `
                        <h3 style="margin-top:0;">Memory</h3>
                        ${mem.length
                            ? mem.map(item => `
                                <div class="doc-item">
                                    <div class="doc-name">${escapeHtml(item.role)}</div>
                                    <div class="doc-meta">${escapeHtml(item.message || "")}</div>
                                </div>
                            `).join("")
                            : `<div class="empty">No memory found.</div>`}
                    `;
                });
            } catch {
                widgets.forEach(widget => {
                    widget.innerHTML = `<h3 style="margin-top:0;">Memory</h3><div class="empty">Could not load memory.</div>`;
                });
            }
        }

        function addMessageToBox(box, role, text) {
            const msg = document.createElement("div");
            msg.className = `message ${role}`;

            let label = "System";
            if (role === "user") label = "You";
            if (role === "ai") label = "AI";

            msg.innerHTML = `
                <span class="label">${label}</span>
                ${escapeHtml(text)}
            `;

            box.appendChild(msg);
            box.scrollTop = box.scrollHeight;
        }

        async function sendChatMessage(message, targetBox) {
            const res = await fetch(`${API_BASE}/chat`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });

            const data = await res.json();

            if (!res.ok) {
                addMessageToBox(targetBox, "ai", data.reply || "Server returned an error.");
            } else {
                addMessageToBox(targetBox, "ai", data.reply || "No reply.");
            }
        }

        function attachChatWidgetHandlers(root) {
            const widgets = root.querySelectorAll('[data-widget="chat"]');

            widgets.forEach((widget, index) => {
                widget.innerHTML = `
                    <h3 style="margin-top:0;">Chat</h3>
                    <div class="widget-chat-box" id="widget-chat-box-${index}">
                        <div class="message system">
                            <span class="label">System</span>
                            Ready...
                        </div>
                    </div>
                    <div class="widget-chat-input-row">
                        <input id="widget-chat-input-${index}" type="text" placeholder="Type here..." />
                        <button class="widget-button" id="widget-chat-send-${index}">Send</button>
                    </div>
                `;

                const box = widget.querySelector(`#widget-chat-box-${index}`);
                const inputEl = widget.querySelector(`#widget-chat-input-${index}`);
                const buttonEl = widget.querySelector(`#widget-chat-send-${index}`);

                async function sendWidgetMessage() {
                    const message = inputEl.value.trim();
                    if (!message) return;

                    addMessageToBox(box, "user", message);
                    inputEl.value = "";

                    try {
                        await sendChatMessage(message, box);
                    } catch (error) {
                        addMessageToBox(box, "ai", "Cannot connect to server.");
                    }
                }

                buttonEl.addEventListener("click", sendWidgetMessage);
                inputEl.addEventListener("keydown", function (e) {
                    if (e.key === "Enter") {
                        sendWidgetMessage();
                    }
                });
            });
        }

        async function hydrateCustomLayout() {
            const box = document.getElementById("customLayout");

            await Promise.all([
                populateFilesWidgets(box),
                populateDocumentsWidgets(box),
                populateMemoryWidgets(box)
            ]);

            attachChatWidgetHandlers(box);
        }

        async function loadCustomLayout() {
            const box = document.getElementById("customLayout");
            const status = document.getElementById("status");
            status.textContent = "Loading layout...";

            try {
                const res = await fetch(`${API_BASE}/load-layout`);
                const data = await res.json();

                if (!data.html || !data.html.trim()) {
                    box.className = "empty-layout";
                    box.innerHTML = "No custom layout saved yet. Open the editor and add blocks.";
                    status.textContent = "Ready";
                    return;
                }

                const existingStyle = document.getElementById("saved-layout-style");
                if (existingStyle) existingStyle.remove();

                const style = document.createElement("style");
                style.id = "saved-layout-style";
                style.textContent = data.css || "";
                document.head.appendChild(style);

                box.className = "";
                box.innerHTML = data.html;

                await hydrateCustomLayout();
                status.textContent = "Ready";
            } catch (error) {
                console.error("Layout load error:", error);
                box.className = "empty-layout";
                box.innerHTML = "Could not load custom layout.";
                status.textContent = "Could not load layout";
            }
        }

        loadSidebarData();
        loadCustomLayout();
    </script>
</body>
</html>
