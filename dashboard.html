<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>APEX</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300;0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700;0,14..32,800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:           #0a0a0a;
            --glass:        rgba(255,255,255,0.03);
            --glass-border: rgba(0,212,255,0.12);
            --accent:       #00d4ff;
            --accent-dim:   rgba(0,212,255,0.18);
            --accent-glow:  rgba(0,212,255,0.35);
            --text:         #eef2ff;
            --muted:        rgba(238,242,255,0.4);
            --danger:       #ff4d6d;
            --topbar-h:     60px;
            --strip-h:      54px;
            --input-h:      76px;
            --panel-w:      272px;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Inter', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ══ APP GRID ══════════════════════════════════════════════════ */
        .app {
            display: grid;
            width: 100vw; height: 100vh;
            grid-template-rows: var(--topbar-h) 1fr var(--strip-h) var(--input-h);
            grid-template-columns: var(--panel-w) 1fr var(--panel-w);
            grid-template-areas:
                "topbar topbar topbar"
                "left   centre right"
                "strip  strip  strip"
                "inputz inputz inputz";
        }

        /* ══ TOP BAR ═══════════════════════════════════════════════════ */
        .topbar {
            grid-area: topbar;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 26px;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(8,8,10,0.92);
            backdrop-filter: blur(20px);
            z-index: 20;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .brand-ring {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: 1.5px solid var(--accent);
            display: grid; place-items: center;
            box-shadow: 0 0 12px var(--accent-glow), inset 0 0 10px rgba(0,212,255,0.05);
            animation: brand-pulse 3s ease-in-out infinite;
        }

        @keyframes brand-pulse {
            0%,100% { box-shadow: 0 0 12px var(--accent-glow), inset 0 0 10px rgba(0,212,255,0.05); }
            50%      { box-shadow: 0 0 22px var(--accent-glow), inset 0 0 18px rgba(0,212,255,0.1);  }
        }

        .brand-ring-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .brand-copy strong {
            display: block;
            font-size: 16px;
            font-weight: 800;
            letter-spacing: 0.28em;
            color: var(--accent);
        }

        .brand-copy span {
            font-size: 9px;
            font-weight: 500;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .topbar-clock {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .clock-time {
            font-size: 22px;
            font-weight: 300;
            letter-spacing: 0.1em;
            color: var(--text);
            font-variant-numeric: tabular-nums;
        }

        .clock-date {
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .topbar-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--accent);
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 7px var(--accent);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .status-dot.offline {
            background: var(--danger);
            box-shadow: 0 0 7px var(--danger);
        }

        /* ══ SIDE PANELS ═══════════════════════════════════════════════ */
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 18px 14px;
            overflow: hidden;
            background: rgba(0,212,255,0.016);
        }

        .left-panel  { grid-area: left;  border-right:  1px solid var(--glass-border); }
        .right-panel { grid-area: right; border-left:   1px solid var(--glass-border); }

        .panel-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: var(--accent);
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
            flex-shrink: 0;
        }

        /* ── Memory list ── */
        .memory-scroll {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-right: 2px;
        }

        .memory-scroll::-webkit-scrollbar { width: 2px; }
        .memory-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

        .mem-item {
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.05);
            background: rgba(255,255,255,0.025);
            transition: border-color 0.2s;
        }

        .mem-role {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .mem-role.user { color: rgba(238,242,255,0.45); }

        .mem-text {
            font-size: 12px;
            line-height: 1.55;
            color: rgba(238,242,255,0.82);
            word-break: break-word;
        }

        /* ── Approval queue ── */
        .queue-scroll {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .queue-scroll::-webkit-scrollbar { width: 2px; }
        .queue-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

        .queue-card {
            padding: 12px 13px;
            border-radius: 12px;
            border: 1px solid rgba(0,212,255,0.18);
            background: rgba(0,212,255,0.045);
        }

        .queue-card-goal {
            font-size: 12px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
            line-height: 1.45;
        }

        .queue-card-meta {
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .queue-actions {
            display: flex;
            gap: 8px;
        }

        .queue-btn {
            flex: 1;
            height: 32px;
            border-radius: 8px;
            border: none;
            font-family: inherit;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: transform 0.14s, opacity 0.14s;
        }

        .queue-btn:hover { transform: translateY(-1px); }
        .queue-btn:active { transform: translateY(1px); }
        .queue-btn:disabled { opacity: 0.45; cursor: default; transform: none; }

        .queue-btn.yes {
            background: rgba(0,212,255,0.14);
            border: 1px solid rgba(0,212,255,0.35);
            color: var(--accent);
        }

        .queue-btn.no {
            background: rgba(255,77,109,0.1);
            border: 1px solid rgba(255,77,109,0.28);
            color: #ff7a92;
        }

        .queue-empty {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            color: var(--muted);
        }

        .queue-empty-icon { font-size: 26px; opacity: 0.35; }
        .queue-empty-text { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; }

        /* ══ CENTRE ════════════════════════════════════════════════════ */
        .centre {
            grid-area: centre;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 22px;
            position: relative;
            overflow: hidden;
        }

        /* Grid background */
        .centre::before {
            content: "";
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.028) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.028) 1px, transparent 1px);
            background-size: 44px 44px;
            pointer-events: none;
        }

        /* Radial halo */
        .centre-halo {
            position: absolute;
            width: 460px; height: 460px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,212,255,0.055) 0%, transparent 68%);
            pointer-events: none;
        }

        /* ── Orb ── */
        .orb-shell {
            position: relative;
            display: grid;
            place-items: center;
            z-index: 2;
        }

        .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 1px solid var(--accent);
            opacity: 0;
            pointer-events: none;
        }

        .pr1 { width: 258px; height: 258px; }
        .pr2 { width: 318px; height: 318px; }
        .pr3 { width: 378px; height: 378px; }

        .orb-shell.active   .pr1 { animation: pulse-out 2s ease-out infinite 0s;    }
        .orb-shell.active   .pr2 { animation: pulse-out 2s ease-out infinite 0.38s; }
        .orb-shell.active   .pr3 { animation: pulse-out 2s ease-out infinite 0.76s; }
        .orb-shell.listening .pr1 { animation: pulse-out 0.85s ease-out infinite 0s;    }
        .orb-shell.listening .pr2 { animation: pulse-out 0.85s ease-out infinite 0.14s; }
        .orb-shell.listening .pr3 { animation: pulse-out 0.85s ease-out infinite 0.28s; }

        @keyframes pulse-out {
            0%   { transform: scale(0.88); opacity: 0.65; }
            100% { transform: scale(1.18); opacity: 0;    }
        }

        .orb {
            width: 196px; height: 196px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            cursor: pointer;
            position: relative;
            background: radial-gradient(circle at 36% 34%, rgba(0,212,255,0.14), rgba(0,0,0,0.82));
            border: 1.5px solid rgba(0,212,255,0.38);
            box-shadow:
                0 0 40px rgba(0,212,255,0.18),
                0 0 80px rgba(0,212,255,0.07),
                inset 0 0 42px rgba(0,212,255,0.04);
            animation: orb-breathe 4.5s ease-in-out infinite;
            transition: box-shadow 0.3s;
            user-select: none;
        }

        .orb:hover {
            box-shadow:
                0 0 58px rgba(0,212,255,0.3),
                0 0 100px rgba(0,212,255,0.12),
                inset 0 0 42px rgba(0,212,255,0.07);
        }

        @keyframes orb-breathe {
            0%,100% { box-shadow: 0 0 40px rgba(0,212,255,0.18), 0 0 80px rgba(0,212,255,0.07), inset 0 0 42px rgba(0,212,255,0.04); }
            50%      { box-shadow: 0 0 56px rgba(0,212,255,0.26), 0 0 110px rgba(0,212,255,0.1), inset 0 0 56px rgba(0,212,255,0.06); }
        }

        .orb-name {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 0.26em;
            color: var(--accent);
            text-shadow: 0 0 18px var(--accent);
        }

        .orb-sub {
            font-size: 8px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(0,212,255,0.52);
        }

        /* ── Waveform ── */
        .waveform {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 28px;
            opacity: 0;
            transition: opacity 0.25s;
            z-index: 2;
        }

        .waveform.active { opacity: 1; }

        .wb {
            width: 3px;
            border-radius: 2px;
            background: var(--accent);
            box-shadow: 0 0 5px var(--accent);
            height: 4px;
        }

        .waveform.active .wb:nth-child(1) { animation: wb 0.75s ease-in-out infinite 0.00s; }
        .waveform.active .wb:nth-child(2) { animation: wb 0.75s ease-in-out infinite 0.10s; }
        .waveform.active .wb:nth-child(3) { animation: wb 0.75s ease-in-out infinite 0.20s; }
        .waveform.active .wb:nth-child(4) { animation: wb 0.75s ease-in-out infinite 0.15s; }
        .waveform.active .wb:nth-child(5) { animation: wb 0.75s ease-in-out infinite 0.05s; }
        .waveform.active .wb:nth-child(6) { animation: wb 0.75s ease-in-out infinite 0.25s; }
        .waveform.active .wb:nth-child(7) { animation: wb 0.75s ease-in-out infinite 0.12s; }

        @keyframes wb {
            0%,100% { height: 4px; }
            50%      { height: 22px; }
        }

        /* ── Orb status text ── */
        .orb-status {
            font-size: 11px;
            font-weight: 500;
            letter-spacing: 0.22em;
            text-transform: uppercase;
            color: rgba(0,212,255,0.6);
            z-index: 2;
        }

        /* ── Chat log ── */
        .chat-log {
            width: 100%;
            max-width: 540px;
            max-height: 188px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 7px;
            padding: 0 20px;
            z-index: 2;
        }

        .chat-log::-webkit-scrollbar { width: 2px; }
        .chat-log::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 2px; }

        .chat-bubble {
            max-width: 84%;
            padding: 9px 14px;
            border-radius: 14px;
            font-size: 13px;
            line-height: 1.55;
            word-break: break-word;
        }

        .chat-bubble.user {
            align-self: flex-end;
            background: rgba(0,212,255,0.11);
            border: 1px solid rgba(0,212,255,0.2);
            color: var(--text);
        }

        .chat-bubble.ai {
            align-self: flex-start;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            color: rgba(238,242,255,0.86);
        }

        .chat-bubble.system {
            align-self: flex-start;
            background: rgba(255,212,0,0.06);
            border: 1px solid rgba(255,212,0,0.14);
            color: rgba(255,220,80,0.8);
            font-size: 11px;
        }

        /* ── Inline approval card (centre) ── */
        .centre-approval {
            width: 100%;
            max-width: 420px;
            padding: 16px 18px;
            border-radius: 14px;
            background: rgba(0,212,255,0.07);
            border: 1px solid rgba(0,212,255,0.24);
            z-index: 2;
        }

        .capp-label {
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 8px;
        }

        .capp-text {
            font-size: 13px;
            line-height: 1.55;
            color: var(--text);
            margin-bottom: 14px;
        }

        .capp-actions {
            display: flex;
            gap: 10px;
        }

        .capp-btn {
            flex: 1;
            height: 38px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.06em;
            cursor: pointer;
            transition: transform 0.14s, opacity 0.14s;
        }

        .capp-btn:hover { transform: translateY(-1px); }
        .capp-btn:active { transform: translateY(1px); }

        .capp-btn.yes {
            background: rgba(0,212,255,0.16);
            border: 1px solid rgba(0,212,255,0.38);
            color: var(--accent);
        }

        .capp-btn.no {
            background: rgba(255,77,109,0.12);
            border: 1px solid rgba(255,77,109,0.3);
            color: #ff7a92;
        }

        /* ══ NOTIFICATION STRIP ════════════════════════════════════════ */
        .notif-strip {
            grid-area: strip;
            display: flex;
            align-items: center;
            border-top: 1px solid var(--glass-border);
            border-bottom: 1px solid var(--glass-border);
            background: rgba(5,5,7,0.6);
            overflow: hidden;
        }

        .notif-label {
            flex-shrink: 0;
            padding: 0 14px;
            font-size: 9px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent);
            border-right: 1px solid var(--glass-border);
            height: 100%;
            display: flex;
            align-items: center;
        }

        .notif-scroll {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 14px;
            overflow-x: auto;
            overflow-y: hidden;
            scrollbar-width: none;
            height: 100%;
        }

        .notif-scroll::-webkit-scrollbar { display: none; }

        .notif-chip {
            flex-shrink: 0;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 5px 12px;
            border-radius: 999px;
            border: 1px solid rgba(0,212,255,0.14);
            background: rgba(0,212,255,0.04);
            font-size: 11px;
            color: var(--text);
            white-space: nowrap;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }

        .notif-chip:hover {
            border-color: rgba(0,212,255,0.3);
            background: rgba(0,212,255,0.09);
        }

        .notif-chip.unread {
            border-color: rgba(0,212,255,0.28);
            color: var(--accent);
        }

        .notif-pip {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 4px var(--accent);
        }

        .notif-none {
            font-size: 11px;
            color: var(--muted);
        }

        /* ══ INPUT AREA ════════════════════════════════════════════════ */
        .input-area {
            grid-area: inputz;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0 22px;
            background: rgba(8,8,10,0.96);
            border-top: 1px solid var(--glass-border);
        }

        .mic-btn {
            width: 46px; height: 46px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 1.5px solid rgba(0,212,255,0.32);
            background: rgba(0,212,255,0.07);
            color: var(--accent);
            font-size: 19px;
            cursor: pointer;
            display: grid; place-items: center;
            transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
        }

        .mic-btn:hover {
            background: rgba(0,212,255,0.14);
            border-color: rgba(0,212,255,0.5);
            box-shadow: 0 0 14px rgba(0,212,255,0.2);
        }

        .mic-btn.listening {
            background: rgba(0,212,255,0.18);
            border-color: var(--accent);
            box-shadow: 0 0 22px rgba(0,212,255,0.4);
            animation: mic-glow 0.9s ease-in-out infinite;
        }

        @keyframes mic-glow {
            0%,100% { box-shadow: 0 0 22px rgba(0,212,255,0.4); }
            50%      { box-shadow: 0 0 38px rgba(0,212,255,0.7); }
        }

        .chat-input {
            flex: 1;
            height: 46px;
            padding: 0 18px;
            border-radius: 23px;
            border: 1px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.03);
            color: var(--text);
            font-family: inherit;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .chat-input:focus {
            border-color: rgba(0,212,255,0.28);
            box-shadow: 0 0 0 1px rgba(0,212,255,0.08);
        }

        .chat-input::placeholder { color: rgba(238,242,255,0.18); }

        .send-btn {
            width: 46px; height: 46px;
            flex-shrink: 0;
            border-radius: 50%;
            border: 1.5px solid rgba(0,212,255,0.38);
            background: rgba(0,212,255,0.1);
            color: var(--accent);
            font-size: 17px;
            cursor: pointer;
            display: grid; place-items: center;
            transition: background 0.2s, box-shadow 0.2s, transform 0.14s;
        }

        .send-btn:hover {
            background: rgba(0,212,255,0.18);
            box-shadow: 0 0 18px rgba(0,212,255,0.28);
            transform: scale(1.06);
        }

        .send-btn:active { transform: scale(0.96); }

        .auto-listen-btn {
            flex-shrink: 0;
            height: 32px;
            padding: 0 13px;
            border-radius: 16px;
            border: 1px solid rgba(0,212,255,0.22);
            background: transparent;
            color: var(--muted);
            font-family: inherit;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.06em;
            cursor: pointer;
            white-space: nowrap;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }

        .auto-listen-btn.on {
            border-color: rgba(0,212,255,0.55);
            color: var(--accent);
            background: rgba(0,212,255,0.08);
        }

        .apex-banner {
            position: fixed;
            top: 68px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 999;
            background: rgba(255,77,109,0.14);
            border: 1px solid rgba(255,77,109,0.4);
            border-radius: 10px;
            padding: 9px 18px;
            font-size: 12px;
            color: #ff8099;
            backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .apex-banner-close {
            cursor: pointer;
            opacity: 0.6;
            font-size: 14px;
        }

        /* ══ UTILITY ════════════════════════════════════════════════════ */
        .empty-note {
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            padding: 14px 0;
        }

        /* ══ RESPONSIVE ════════════════════════════════════════════════ */
        @media (max-width: 960px) {
            :root { --panel-w: 220px; }
        }

        @media (max-width: 700px) {
            .app {
                grid-template-columns: 1fr;
                grid-template-areas:
                    "topbar"
                    "centre"
                    "strip"
                    "inputz";
            }
            .left-panel, .right-panel { display: none; }
        }
    </style>
</head>
<body>
<div class="app">

    <!-- ══ TOP BAR ══ -->
    <header class="topbar">
        <div class="brand">
            <div class="brand-ring"><div class="brand-ring-dot"></div></div>

    <main class="centre">

                <div class="orb-name">APEX</div>
                <div class="orb-sub">AI System</div>

        <div class="waveform" id="waveform">
            <div class="wb"></div><div class="wb"></div><div class="wb"></div>
            <div class="wb"></div><div class="wb"></div><div class="wb"></div>
            <div class="wb"></div>
        </div>

        <div class="orb-status" id="orbStatus">Ready</div>

        <div class="chat-log" id="chatLog"></div>

    <div class="input-area">
        <button class="mic-btn" id="micBtn" onclick="toggleListening()" title="Voice input">🎤</button>
        <input class="chat-input" id="chatInput" type="text" placeholder="Ask APEX anything…" autocomplete="off" />
        <button class="auto-listen-btn" id="autoListenBtn" onclick="toggleAutoListen()" title="Toggle auto-listen">Auto-listen: OFF</button>
        <button class="send-btn" onclick="sendChatCommand()" title="Send">&#10148;</button>
    </div>

</div><!-- .app -->

<script>
// ══ CONFIG ════════════════════════════════════════════════════════════
const API_BASE = "https://ai-os-server-jx20.onrender.com";
const APP_KEY  = new URLSearchParams(window.location.search).get("app_key") || "";
const MAX_ITEMS           = 5;
const REFRESH_INTERVAL_MS = 18000;

// ══ STATE ═════════════════════════════════════════════════════════════
let isListening         = false;
let autoListen          = false;
let lastSendWasVoice    = false;
let cachedTasks         = [];
let cachedNotifications = [];
let recognition         = null;
const inFlightRefreshes = {};
const renderSigs        = {};

// ══ UTILITIES ═════════════════════════════════════════════════════════
function buildApiUrl(path) {
    if (!APP_KEY) return `${API_BASE}${path}`;
    const sep = path.includes("?") ? "&" : "?";
    return `${API_BASE}${path}${sep}app_key=${encodeURIComponent(APP_KEY)}`;
}

function buildApiHeaders(extra = {}) {
    return APP_KEY ? { ...extra, "x-app-key": APP_KEY } : extra;
}

function escapeHtml(v) {
    const d = document.createElement("div");
    d.textContent = v == null ? "" : String(v);
    return d.innerHTML;
}

function shortenText(v, max = 64) {
    const t = String(v || "").trim();
    return t.length > max ? t.slice(0, max - 1) + "…" : t || "Untitled";
}

function formatTimestamp(v) {
    if (!v) return "";
    const d = new Date(v);
    return isNaN(d.getTime()) ? "" : d.toLocaleString();
}

async function fetchJson(path, options = {}) {
    const res = await fetch(buildApiUrl(path), {
        ...options,
        headers: buildApiHeaders({ Accept: "application/json", ...(options.headers || {}) })
    });
    const ct   = res.headers.get("content-type") || "";
    const text = await res.text();
    if (!ct.toLowerCase().includes("application/json")) {
        throw new Error(`Expected JSON from ${path}.`);
    }
    let data;
    try { data = text ? JSON.parse(text) : {}; } catch { throw new Error(`Invalid JSON from ${path}.`); }
    if (!res.ok) throw new Error(data.reply || data.error || "Request failed.");
    return data;
}

async function runRefresh(key, fn) {
    if (inFlightRefreshes[key]) return inFlightRefreshes[key];
    inFlightRefreshes[key] = (async () => {
        try { return await fn(); } finally { delete inFlightRefreshes[key]; }
    })();
    return inFlightRefreshes[key];
}

// ══ CLOCK ═════════════════════════════════════════════════════════════
function tickClock() {
    const now = new Date();
    document.getElementById("clockTime").textContent =
        now.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit", second: "2-digit" });
    document.getElementById("clockDate").textContent =
        now.toLocaleDateString([], { weekday: "long", month: "long", day: "numeric" });
}
setInterval(tickClock, 1000);
tickClock();

// ══ CONNECTION STATUS ═════════════════════════════════════════════════
function setConnStatus(online) {
    const dot   = document.getElementById("connDot");
    const label = document.getElementById("connLabel");
    dot.classList.toggle("offline", !online);
    label.textContent = online ? "Online" : "Offline";
}

// ══ ORB STATE ═════════════════════════════════════════════════════════
function setOrbState(state) {
    // state: "ready" | "listening" | "processing" | "speaking"
    const shell    = document.getElementById("orbShell");
    const statusEl = document.getElementById("orbStatus");
    const waveform = document.getElementById("waveform");
    const micBtn   = document.getElementById("micBtn");

    shell.classList.remove("active", "listening");
    waveform.classList.remove("active");
    micBtn.classList.remove("listening");

    const labels = { ready: "Ready", listening: "Listening…", processing: "Processing…", thinking: "Thinking…", speaking: "Speaking…" };
    statusEl.textContent = labels[state] || "Ready";

    if (state === "listening") {
        shell.classList.add("listening");
        waveform.classList.add("active");
        micBtn.classList.add("listening");
    } else if (state === "processing" || state === "speaking") {
        shell.classList.add("active");
    }
}

// ══ VOICE OUTPUT ══════════════════════════════════════════════════════
let _selectedVoice = null;

function _pickVoice() {
    if (!window.speechSynthesis) return null;
    const vv = window.speechSynthesis.getVoices();
    if (!vv.length) return null;
    _selectedVoice =
        vv.find(v => /google uk english male/i.test(v.name))                         ||
        vv.find(v => /google us english/i.test(v.name))                              ||
        vv.find(v => /microsoft ryan online.*english.*united kingdom/i.test(v.name)) ||
        vv.find(v => /microsoft guy online.*natural/i.test(v.name))                  ||
        vv.find(v => v.lang === "en-GB" && /male/i.test(v.name))                     ||
        vv.find(v => v.lang === "en-US" && /male/i.test(v.name))                     ||
        vv.find(v => v.lang.startsWith("en") && /male/i.test(v.name))               ||
        vv.find(v => v.lang === "en-GB")                                              ||
        vv.find(v => v.lang === "en-US")                                              ||
        vv.find(v => v.lang.startsWith("en"))                                         ||
        vv[0];
    return _selectedVoice;
}

if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = () => _pickVoice();
    _pickVoice();
}

function cleanForSpeech(text) {
    return String(text || "")
        .replace(/\[APPROVAL REQUIRED\]/gi, "")
        .replace(/#{1,6}\s*/g, "")
        .replace(/\*\*(.+?)\*\*/g, "$1")
        .replace(/\*(.+?)\*/g, "$1")
        .replace(/~~(.+?)~~/g, "$1")
        .replace(/`{1,3}[^`]*`{1,3}/g, "")
        .replace(/!\[.*?\]\(.*?\)/g, "")
        .replace(/\[([^\]]+)\]\([^)]*\)/g, "$1")
        .replace(/https?:\/\/\S+/g, "")
        .replace(/[\u{1F300}-\u{1FAFF}]/gu, "")
        .replace(/[\u{2600}-\u{26FF}]/gu, "")
        .replace(/[\u{2700}-\u{27BF}]/gu, "")
        .replace(/\b[\w.-]+\.(txt|md|js|ts|json|csv|pdf|png|jpg|jpeg|html|py|sh)\b/gi, "")
        .replace(/^[-•*+]\s+/gm, ", ")
        .replace(/^\d+\.\s+/gm, "")
        .replace(/→/g, "to")
        .replace(/&/g, "and")
        .replace(/\n+/g, " ")
        .replace(/\s{2,}/g, " ")
        .trim();
}

function _firstSentence(text) {
    const m = text.match(/^.+?[.!?](?=\s|$)/);
    return m ? m[0].trim() : text.split(" ").slice(0, 30).join(" ");
}

function _firstTwoSentences(text) {
    const parts = text.match(/[^.!?]+[.!?](?:\s|$)/g);
    if (!parts) return text.split(" ").slice(0, 50).join(" ");
    return (parts.slice(0, 2).join("")).trim();
}

function summariseForSpeech(raw) {
    const clean = cleanForSpeech(raw);
    if (clean.length < 100) return clean;

    const t = clean.toLowerCase();

    if (clean.length >= 300) {
        if (/saved|note saved|stored/.test(t))                         return "Got it, saved.";
        if (/deleted|removed/.test(t))                                 return "Done, removed.";
        if (/file created|created/.test(t))                            return "Created.";
        if (/renamed/.test(t))                                         return "Renamed.";
        if (/error|could not|couldn't|failed|unable/.test(t))          return "Something went wrong, please try again.";
        if (/here are|found|results|documents/.test(t) || /\?/.test(clean)) return _firstSentence(clean);
        return _firstTwoSentences(clean);
    }

    // 100-299 chars
    return _firstSentence(clean);
}

const FILLERS = [
    { text: null, weight: 40 },
    { text: "Sure.", weight: 20 },
    { text: "On it.", weight: 20 },
    { text: "Right.", weight: 10 },
    { text: "Got it.", weight: 10 },
];

function _pickFiller() {
    const roll = Math.random() * 100;
    let acc = 0;
    for (const f of FILLERS) { acc += f.weight; if (roll < acc) return f.text; }
    return null;
}

function _speakUtterance(phrase, { onStart, onEnd } = {}) {
    const utt = new SpeechSynthesisUtterance(phrase);
    utt.rate   = 1.08;
    utt.pitch  = 0.95;
    utt.volume = 1;
    const voice = _selectedVoice || _pickVoice();
    if (voice) utt.voice = voice;
    if (onStart) utt.onstart = onStart;
    if (onEnd)   utt.onend   = onEnd;
    utt.onerror = () => {};
    window.speechSynthesis.speak(utt);
}

async function speakWithElevenLabs(text) {
    const phrase = summariseForSpeech(text);
    if (!phrase) return false;

    try {
        const res = await fetch(buildApiUrl("/api/speak"), {
            method: "POST",
            headers: buildApiHeaders({ "Content-Type": "application/json" }),
            body: JSON.stringify({ text: phrase })
        });

        if (!res.ok) return false;

        const blob = await res.blob();
        const url  = URL.createObjectURL(blob);
        const audio = new Audio(url);

        setOrbState("speaking");
        await new Promise((resolve, reject) => {
            audio.onended  = resolve;
            audio.onerror  = reject;
            audio.play().catch(reject);
        });

        URL.revokeObjectURL(url);
        return true;
    } catch (_) {
        return false;
    }
}

function _speakFallback(phrase, { onEnd } = {}) {
    if (!window.speechSynthesis) { if (onEnd) onEnd(); return; }
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(phrase);
    utt.rate = 1.08; utt.pitch = 0.95; utt.volume = 1;
    const voice = _selectedVoice || _pickVoice();
    if (voice) utt.voice = voice;
    utt.onend   = () => { if (onEnd) onEnd(); };
    utt.onerror = () => { if (onEnd) onEnd(); };
    window.speechSynthesis.speak(utt);
}

async function speak(text, { useFiller = false } = {}) {
    try {
        if (window.speechSynthesis) window.speechSynthesis.cancel();

        const phrase = summariseForSpeech(text);
        if (!phrase) return;

        setOrbState("speaking");

        const filler = useFiller ? _pickFiller() : null;

        const speakMain = async () => {
            const ok = await speakWithElevenLabs(phrase);
            if (!ok) {
                await new Promise(resolve => _speakFallback(phrase, { onEnd: resolve }));
            }
            setOrbState("ready");
            if (autoListen) setTimeout(() => startListening(), 1000);
        };

        if (filler) {
            const fillerOk = await speakWithElevenLabs(filler);
            if (!fillerOk) {
                await new Promise(resolve => _speakFallback(filler, { onEnd: resolve }));
            }
            await new Promise(r => setTimeout(r, 300));
        }

        await speakMain();
    } catch (_) {
        setOrbState("ready");
    }
}

// ══ VOICE INPUT ═══════════════════════════════════════════════════════
function _showBanner(id, html) {
    if (document.getElementById(id)) return;
    const el = document.createElement("div");
    el.id = id;
    el.className = "apex-banner";
    el.innerHTML = html + `<span class="apex-banner-close" onclick="document.getElementById('${id}').remove()">✕</span>`;
    document.body.appendChild(el);
}

function initRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
        _showBanner("banner-nospeech", "Voice not supported in this browser — use Chrome.");
        return null;
    }
    const rec = new SR();
    rec.continuous     = false;
    rec.interimResults = false;
    rec.lang           = "en-GB";

    rec.onresult = e => {
        const transcript = e.results[0][0].transcript;
        document.getElementById("chatInput").value = transcript;
        stopListening();
        lastSendWasVoice = true;
        sendVoiceChatCommand(transcript);
    };

    rec.onerror = e => {
        stopListening();
        if (e.error === "not-allowed" || e.error === "permission-denied") {
            _showBanner("banner-micdenied",
                "Microphone access denied — <strong style='cursor:pointer;text-decoration:underline' onclick=\"navigator.mediaDevices.getUserMedia({audio:true}).catch(()=>{})\">click here to enable</strong>.");
        }
    };

    rec.onend = () => { if (isListening) stopListening(); };
    return rec;
}

function startListening() {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    if (!recognition) recognition = initRecognition();
    if (!recognition) return;
    isListening = true;
    setOrbState("listening");
    try { recognition.start(); } catch { stopListening(); }
}

function stopListening() {
    isListening = false;
    setOrbState("ready");
    if (recognition) { try { recognition.stop(); } catch (_) {} }
}

function toggleListening() {
    if (isListening) stopListening(); else startListening();
}

function toggleAutoListen() {
    autoListen = !autoListen;
    const btn = document.getElementById("autoListenBtn");
    btn.textContent = `Auto-listen: ${autoListen ? "ON" : "OFF"}`;
    btn.classList.toggle("on", autoListen);
}

// ══ CHAT ══════════════════════════════════════════════════════════════
function _cleanForDisplay(text) {
    return String(text || "")
        .replace(/\*\*(.+?)\*\*/g, "$1")
        .replace(/\*(.+?)\*/g, "$1")
        .replace(/~~(.+?)~~/g, "$1")
        .replace(/`{1,3}[^`]*`{1,3}/g, "")
        .replace(/#{1,6}\s*/g, "")
        .replace(/[\u{1F300}-\u{1FAFF}]/gu, "")
        .replace(/[\u{2600}-\u{26FF}]/gu, "")
        .replace(/[\u{2700}-\u{27BF}]/gu, "")
        .replace(/\[APPROVAL REQUIRED\]/gi, "")
        .trim();
}

function renderChatMessage(role, message) {
    const log = document.getElementById("chatLog");
    if (!log) return;
    const nearBottom = (log.scrollHeight - log.scrollTop - log.clientHeight) < 120;

    if (role === "ai" && /\[APPROVAL REQUIRED\]/i.test(message)) {
        renderCentreApprovalCard(message);
    }

    const display = role === "ai" ? _cleanForDisplay(message) : String(message || "");

    const bubble = document.createElement("div");
    bubble.className = `chat-bubble ${role}`;
    bubble.textContent = display || message;
    log.appendChild(bubble);

    if (nearBottom || role === "user" || role === "system") {
        log.scrollTop = log.scrollHeight;
    }
}

function renderCentreApprovalCard(message) {
    const existing = document.getElementById("centreApproval");
    if (existing) existing.remove();

    const clean = message.replace(/\[APPROVAL REQUIRED\]/gi, "").trim();
    const card  = document.createElement("div");
    card.id = "centreApproval";
    card.className = "centre-approval";
    card.innerHTML = `
        <div class="capp-label">⚡ Approval Required</div>
        <div class="capp-text">${escapeHtml(shortenText(clean, 200))}</div>
        <div class="capp-actions">
            <button class="capp-btn yes" onclick="sendApprovalDecision('approved')">✓ Approve</button>
            <button class="capp-btn no"  onclick="sendApprovalDecision('rejected')">✕ Reject</button>
        </div>
    `;

    // Insert before chat-log
    const log = document.getElementById("chatLog");
    log.parentNode.insertBefore(card, log);
}

async function sendApprovalDecision(decision) {
    const card = document.getElementById("centreApproval");
    if (card) card.remove();
    await sendChatCommandFromText(decision);
}

async function sendChatCommandFromText(command, options = {}) {
    const { silent = false } = options;
    const wasVoice = lastSendWasVoice;
    lastSendWasVoice = false;

    if (!silent) renderChatMessage("user", command);
    setOrbState("thinking");

    try {
        const data = await fetchJson("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: command })
        });

        const reply = data.reply || "No reply.";
        if (!silent) {
            renderChatMessage("ai", reply);
            setOrbState("speaking");
            speak(reply, { useFiller: wasVoice });
        } else {
            setOrbState("ready");
        }

        setConnStatus(true);
        refreshAll();
        return data;
    } catch (error) {
        const msg = error.message || "Server error.";
        if (!silent) {
            renderChatMessage("system", msg);
            try { speak(msg); } catch (_) {}
        }
        setOrbState("ready");
        setConnStatus(false);
        throw error;
    }
}

async function sendVoiceChatCommand(msg) {
    if (!msg || !msg.trim()) return;
    document.getElementById("chatInput").value = "";
    renderChatMessage("user", msg);
    setOrbState("thinking");

    try {
        const data = await fetchJson("/api/voice-chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: msg })
        });

        const reply = data.reply || "Done.";
        renderChatMessage("ai", reply);
        setOrbState("speaking");
        await speak(reply, { useFiller: true });

        setConnStatus(true);
        refreshAll();
    } catch (error) {
        const errMsg = error.message || "Server error.";
        renderChatMessage("system", errMsg);
        try { await speak(errMsg); } catch (_) {}
        setOrbState("ready");
        setConnStatus(false);
    }
}

async function sendChatCommand() {
    const input = document.getElementById("chatInput");
    const msg   = input.value.trim();
    if (!msg) return;
    input.value = "";
    await sendChatCommandFromText(msg);
}

// ══ MEMORY ════════════════════════════════════════════════════════════
async function refreshMemory() {
    return runRefresh("memory", async () => {
        const container = document.getElementById("memoryList");
        try {
            const data   = await fetchJson("/memory");
            const memory = Array.isArray(data.memory) ? data.memory.slice(-MAX_ITEMS).reverse() : [];
            if (!memory.length) {
                container.innerHTML = '<div class="empty-note">No memory yet.</div>';
                return;
            }
            container.innerHTML = memory.map(item => {
                const role      = String(item.role || "ai").toLowerCase();
                const roleClass = role === "assistant" ? "ai" : role;
                const roleLabel = role === "user" ? "You" : "APEX";
                return `
                    <div class="mem-item">
                        <div class="mem-role ${escapeHtml(roleClass)}">${escapeHtml(roleLabel)}</div>
                        <div class="mem-text">${escapeHtml(shortenText(item.message || "", 96))}</div>
                    </div>
                `;
            }).join("");
            setConnStatus(true);
        } catch (err) {
            container.innerHTML = `<div class="empty-note">${escapeHtml(err.message)}</div>`;
        }
    });
}

// ══ NOTIFICATIONS ═════════════════════════════════════════════════════
async function loadNotifications() {
    return runRefresh("notifications", async () => {
        try {
            const data       = await fetchJson("/notifications");
            cachedNotifications = Array.isArray(data.notifications) ? data.notifications : [];
            renderNotifStrip();
            setConnStatus(true);
        } catch (_) {}
    });
}

function renderNotifStrip() {
    const strip = document.getElementById("notifScroll");
    if (!cachedNotifications.length) {
        strip.innerHTML = '<span class="notif-none">No notifications.</span>';
        return;
    }
    strip.innerHTML = cachedNotifications.slice(0, 14).map(item => `
        <div class="notif-chip ${item.read ? "" : "unread"}"
             onclick="viewNotification(${item.id}, '${encodeURIComponent(item.title || "")}', '${encodeURIComponent(item.message || "")}', ${item.read ? "true" : "false"})">
            ${!item.read ? '<span class="notif-pip"></span>' : ""}
            ${escapeHtml(shortenText(item.title || "Notification", 40))}
        </div>
    `).join("");
}

async function viewNotification(id, encTitle, encMsg, isRead) {
    const title = decodeURIComponent(encTitle || "Notification");
    const msg   = decodeURIComponent(encMsg || "No details.");
    renderChatMessage("system", `[${title}] ${msg}`);
    speak(msg);
    if (!isRead) {
        try {
            await fetchJson(`/notifications/${id}/read`, {
                method: "POST",
                headers: { "Content-Type": "application/json" }
            });
            await loadNotifications();
        } catch (_) {}
    }
}

// ══ APPROVAL QUEUE (right panel, agent tasks) ═════════════════════════
async function loadTasks() {
    return runRefresh("tasks", async () => {
        try {
            const data   = await fetchJson("/agent-tasks");
            cachedTasks  = Array.isArray(data.tasks) ? data.tasks : [];
            renderApprovalQueue();
            setConnStatus(true);
        } catch (_) {}
    });
}

function renderApprovalQueue() {
    const container = document.getElementById("approvalQueue");
    const waiting   = cachedTasks.filter(t => t.status === "waiting_approval");

    if (!waiting.length) {
        container.innerHTML = `
            <div class="queue-empty">
                <div class="queue-empty-icon">✓</div>
                <div class="queue-empty-text">No pending</div>
            </div>
        `;
        return;
    }

    container.innerHTML = waiting.map(task => `
        <div class="queue-card">
            <div class="queue-card-goal">${escapeHtml(shortenText(task.goal || "Untitled task", 70))}</div>
            <div class="queue-card-meta">Task ${escapeHtml(String(task.id))}</div>
            <div class="queue-actions">
                <button class="queue-btn yes" onclick="approveAgentTask(${task.id}, this)">Approve</button>
                <button class="queue-btn no"  onclick="rejectAgentTask(${task.id}, this)">Reject</button>
            </div>
        </div>
    `).join("");
}

async function approveAgentTask(id, btn) {
    if (btn) { btn.disabled = true; btn.textContent = "…"; }
    await sendChatCommandFromText(`approve task ${id}`, { silent: true });
    await loadTasks();
}

async function rejectAgentTask(id, btn) {
    if (btn) { btn.disabled = true; btn.textContent = "…"; }
    await sendChatCommandFromText("cancel agent", { silent: true });
    await loadTasks();
}

// ══ DOCUMENT / FILE ACTIONS (compatibility) ════════════════════════════
async function refreshDocuments() {
    try { await fetchJson("/documents"); } catch (_) {}
}

async function refreshFiles() {
    try { await fetchJson("/files"); } catch (_) {}
}

async function refreshAgentData() {
    await Promise.all([loadTasks(), loadNotifications()]);
}

async function viewDocument(enc) {
    return sendChatCommandFromText(`read file ${decodeURIComponent(enc)}`);
}

async function summariseDocument(enc, btn) {
    return sendChatCommandFromText(`summarise file ${decodeURIComponent(enc)}`);
}

async function deleteDocumentAction(enc) {
    if (!confirm(`Delete "${decodeURIComponent(enc)}"?`)) return;
    return sendChatCommandFromText(`delete file ${decodeURIComponent(enc)}`);
}

async function readFileAction(enc) {
    return sendChatCommandFromText(`read file ${decodeURIComponent(enc)}`);
}

async function deleteFileAction(enc) {
    if (!confirm(`Delete "${decodeURIComponent(enc)}"?`)) return;
    return sendChatCommandFromText(`delete file ${decodeURIComponent(enc)}`);
}

async function runSchedulesNowFromDashboard() {
    return sendChatCommandFromText("run schedules now");
}

async function viewTaskDetails(id) {
    try {
        const data = await fetchJson(`/agent-task/${id}`);
        const task = data.task;
        renderChatMessage("system", `Task ${id}: ${task.goal || "No goal"} — ${task.status} — ${task.result || "No result yet"}`);
    } catch (err) {
        renderChatMessage("system", err.message || "Could not load task.");
    }
}

// ══ REFRESH ALL ════════════════════════════════════════════════════════
async function refreshAll() {
    await Promise.all([
        refreshMemory(),
        loadNotifications(),
        loadTasks()
    ]);
}

// ══ KEYBOARD ══════════════════════════════════════════════════════════
document.getElementById("chatInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChatCommand(); }
});

// ══ INIT ══════════════════════════════════════════════════════════════
setOrbState("ready");
refreshAll();
setInterval(refreshAll, REFRESH_INTERVAL_MS);
</script>
