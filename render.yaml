services:
  - type: web
    name: ai-os-server
    env: node
    buildCommand: pip install graphifyy; npm install --legacy-peer-deps && (npx playwright install chromium --with-deps || true)
    startCommand: node --max-old-space-size=460 server.js
    healthCheckPath: /health

  - type: web
    name: apex-ai-sidecar
    env: python
    buildCommand: pip install -r sidecar/requirements.txt
    startCommand: uvicorn sidecar.main:app --host 0.0.0.0 --port $PORT
    # After deploy: set RAG_SIDECAR_URL on ai-os-server to this service's URL
    # RAG-Anything activates if OPENAI_API_KEY is also set on this service
