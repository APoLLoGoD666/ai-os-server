domain: DOM-000007
events:
  - name: AGENT_ACTIVATED
    description: A user triggered an agent via the interface.
    schema:
      agent_id: string
      agent_key: string
      task: string
      triggered_by: string
      source: string
      timestamp: number
    guaranteed_delivery: false
    max_latency_ms: 100
    consumers:
      - DOM-000002   # Intelligence receives the activation
      - DOM-000006   # Observability records it
